name: Prepared ticket
description: Define one bounded TideFS outcome before implementation starts.
title: "<area>: <outcome>"
body:
  - type: textarea
    id: observable-outcome
    attributes:
      label: Observable outcome
      description: >-
        Name the single mounted, block, tidefsctl, runtime-state, kernel,
        failure, or waste-removal result this issue must deliver.
      placeholder: |
        After this change, ...
    validations:
      required: true
  - type: textarea
    id: acceptance-checks
    attributes:
      label: Acceptance checks
      description: List 3–5 objective checks that make the outcome complete.
      placeholder: |
        - ...
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: expected-write-set
    attributes:
      label: Exact file paths
      description: >-
        List every repository-relative file to edit, create, or delete. Each
        entry must be an exact nonempty file path; directories, globs, and path
        prefixes are not valid.
      placeholder: |
        - `path/to/file.rs`
        - `docs/exact-file.md`
    validations:
      required: true
  - type: textarea
    id: focused-test-commands
    attributes:
      label: Focused test commands
      description: >-
        Give exact focused checks for the touched files or packages and, when
        product behavior changes, the smallest meaningful outer-boundary test.
      placeholder: |
        - `cargo test -p <package> --locked <test>`
        - `git diff --check`
    validations:
      required: true
