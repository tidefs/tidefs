name: Prepared ticket
description: Define an implementation-ready TideFS issue before a worker owns a branch.
title: "<area>: <behavior>"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for a TideFS slice that is ready to coordinate through GitHub issues and pull requests.

        Keep the issue aligned with the [TideFS GitHub PR development policy](https://github.com/tidefs/tidefs/blob/master/docs/GITHUB_PR_DEVELOPMENT.md).
        This form does not change workflow files, runner settings, repository settings, labels, secrets, or TideFS product policy.
  - type: textarea
    id: behavior
    attributes:
      label: Behavior
      description: >-
        Describe the concrete behavior to add, change, investigate, or document.
        Keep the slice small enough for one branch.
      placeholder: |
        Add ...
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: List the observable conditions that make this issue complete.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: expected-write-set
    attributes:
      label: Expected write set
      description: >-
        List exact paths or path prefixes this issue authorizes, and state why
        they do not overlap active issues, PRs, branches, or worktrees.
      placeholder: |
        Expected paths:
        - `path/or/prefix`

        Non-overlap evidence:
        - Checked ...
    validations:
      required: true
  - type: textarea
    id: prerequisites
    attributes:
      label: Prerequisites and design gates
      description: >-
        Name blocking issues, PRs, design questions, prerequisites, or stop
        conditions, or state "None" with the evidence reviewed.
      placeholder: |
        - None. Reviewed ...

        or

        - Blocks on #...
    validations:
      required: true
  - type: textarea
    id: validation-tier
    attributes:
      label: Validation tier
      description: >-
        State the smallest validation tier that proves this slice.
        Documentation/source inspection is enough for docs-only work; do not
        require runtime validation unless behavior changed at that layer.
      placeholder: |
        Documentation/source inspection only:
        - Review ...
        - Run `git diff --check`

        or

        Focused GitHub Actions:
        - Dispatch ...
    validations:
      required: true
