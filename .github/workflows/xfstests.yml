name: xfstests

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target to run
        required: true
        default: all
        type: choice
        options:
          - all
          - fuse
          - kmod-smoke
          - k7-vfs
      tests:
        description: Optional space-separated focused tests, e.g. generic/003
        required: false
        default: ''
        type: string
  schedule:
    - cron: '17 1 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target || 'scheduled' }}
  cancel-in-progress: false

jobs:
  xfstests:
    name: ${{ matrix.target }}
    if: ${{ github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1' }}
    runs-on: [self-hosted, linux, x64, tidefs, nix, kvm, xfstests]
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fuse
          - target: kmod-smoke
          - target: k7-vfs

    steps:
      - name: Checkout
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/checkout@v6

      - name: Host preflight
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        run: |
          test -c /dev/kvm
          test -c /dev/fuse

      - name: Prepare xfstests artifact root
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          WORK_ROOT: ${{ runner.temp }}/tidefs-xfstests-work/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_ROOT"
          rm -rf "$WORK_ROOT"
          mkdir -p "$ARTIFACT_ROOT"
          mkdir -p "$WORK_ROOT"
          {
            printf 'workflow=%s\n' "${GITHUB_WORKFLOW}"
            printf 'run_id=%s\n' "${GITHUB_RUN_ID}"
            printf 'run_attempt=%s\n' "${GITHUB_RUN_ATTEMPT}"
            printf 'job=%s\n' "${GITHUB_JOB}"
            printf 'target=%s\n' "${{ matrix.target }}"
            printf 'artifact_root=%s\n' "$ARTIFACT_ROOT"
            printf 'work_root=%s\n' "$WORK_ROOT"
            printf 'utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$ARTIFACT_ROOT/artifact-root.env"

      - name: Run target
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          WORK_ROOT: ${{ runner.temp }}/tidefs-xfstests-work/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          XFSTESTS_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.tests || '' }}
        run: |
          set -euo pipefail
          maybe_tests_args=()
          if [ -n "$XFSTESTS_TESTS" ]; then
            maybe_tests_args=(--tests "$XFSTESTS_TESTS")
          fi
          case "${{ matrix.target }}" in
            fuse)
              TIDEFS_FUSE_XFSTESTS_TMPDIR="$WORK_ROOT/fuse" \
                timeout --foreground 14400s \
                  nix run .#fuse-xfstests-validation -- \
                    "${maybe_tests_args[@]}" \
                    --output "$ARTIFACT_ROOT/validation.json"
              ;;
            kmod-smoke)
              TIDEFS_OUTPUT_ROOT="$ARTIFACT_ROOT" \
                timeout --foreground 14400s \
                  nix run .#kmod-xfstests-smoke -- \
                    --timeout 3600 \
                    "${maybe_tests_args[@]}"
              ;;
            k7-vfs)
              TIDEFS_K7_TFS_XFSTESTS_TMPDIR="$WORK_ROOT/k7-vfs" \
                timeout --foreground 14400s \
                  nix run .#k7-vfs-xfstests-validation -- \
                    "${maybe_tests_args[@]}" \
                    --output "$ARTIFACT_ROOT/validation.json"
              ;;
            *)
              echo "unknown xfstests target: ${{ matrix.target }}" >&2
              exit 2
              ;;
          esac

      - name: Write xfstests evidence manifest
        if: ${{ always() && (github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target) }}
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          EVIDENCE_WORKFLOW: ${{ github.workflow }}
          EVIDENCE_RUN_ID: ${{ github.run_id }}
          EVIDENCE_RUN_ATTEMPT: ${{ github.run_attempt }}
          EVIDENCE_SOURCE_REF: ${{ github.ref }}
          EVIDENCE_SOURCE_SHA: ${{ github.sha }}
          EVIDENCE_TARGET: ${{ matrix.target }}
          EVIDENCE_TESTS_INPUT: ${{ inputs.tests || '' }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_ROOT"
          finished_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Evidence scope: focused when tests are supplied, broad otherwise.
          if [ -n "${EVIDENCE_TESTS_INPUT:-}" ]; then
            evidence_scope="focused"
          else
            evidence_scope="broad"
          fi

          # Write manifest via jq when available, else fall back to a minimal valid manifest.
          if command -v jq >/dev/null 2>&1; then
            tests_json="$(printf '%s' "${EVIDENCE_TESTS_INPUT:-}" | jq -R 'split(" ") | map(select(. != ""))')"
            artifact_paths_json="[]"
            if [ -d "$ARTIFACT_ROOT" ]; then
              artifact_paths_json="$(cd "$ARTIFACT_ROOT" && find . -type f -not -name 'evidence-manifest.json' | sed 's|^\./||' | sort | jq -R -s 'split("\n") | map(select(. != ""))')"
            fi
            jq -n \
              --arg manifest_version "1" \
              --arg workflow "$EVIDENCE_WORKFLOW" \
              --arg run_id "$EVIDENCE_RUN_ID" \
              --arg run_attempt "$EVIDENCE_RUN_ATTEMPT" \
              --arg source_ref "$EVIDENCE_SOURCE_REF" \
              --arg source_sha "$EVIDENCE_SOURCE_SHA" \
              --arg target "$EVIDENCE_TARGET" \
              --arg evidence_scope "$evidence_scope" \
              --argjson tests "$tests_json" \
              --argjson artifact_paths "$artifact_paths_json" \
              --arg finished_at "$finished_at" \
              '{
                manifest_version: ($manifest_version | tonumber),
                workflow: $workflow,
                run_id: $run_id,
                run_attempt: $run_attempt,
                source_ref: $source_ref,
                source_sha: $source_sha,
                target: $target,
                evidence_scope: $evidence_scope
              }
              + if $tests != [] then {tests: $tests} else {} end
              + if $artifact_paths != [] then {artifact_paths: $artifact_paths} else {} end
              + {finished_at: $finished_at}' \
              > "$ARTIFACT_ROOT/evidence-manifest.json"
          else
            cat > "$ARTIFACT_ROOT/evidence-manifest.json" << MANIFEST_EOF
          {
            "manifest_version": 1,
            "workflow": "${EVIDENCE_WORKFLOW}",
            "run_id": "${EVIDENCE_RUN_ID}",
            "run_attempt": "${EVIDENCE_RUN_ATTEMPT}",
            "source_ref": "${EVIDENCE_SOURCE_REF}",
            "source_sha": "${EVIDENCE_SOURCE_SHA}",
            "target": "${EVIDENCE_TARGET}",
            "evidence_scope": "${evidence_scope}",
            "tests": [],
            "artifact_paths": [],
            "finished_at": "${finished_at}"
          }
          MANIFEST_EOF
          fi


      - name: Upload xfstests output
        if: ${{ always() && (github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target) }}
        uses: actions/upload-artifact@v7
        with:
          name: xfstests-${{ matrix.target }}
          path: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup xfstests work root
        if: ${{ always() && (github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target) }}
        env:
          WORK_ROOT: ${{ runner.temp }}/tidefs-xfstests-work/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf "$WORK_ROOT"
