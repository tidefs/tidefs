name: xfstests

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target to run
        required: true
        default: all
        type: choice
        options:
          - all
          - fuse
          - kmod-smoke
          - k7-vfs
      tests:
        description: Optional space-separated focused tests, e.g. generic/003 or kmod-smoke labels
        required: false
        default: ''
        type: string
  schedule:
    - cron: '17 1 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target || 'scheduled' }}
  cancel-in-progress: false

jobs:
  xfstests:
    name: ${{ matrix.target }}
    if: ${{ github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1' }}
    runs-on: [self-hosted, linux, x64, tidefs, nix, kvm, xfstests]
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fuse
          - target: kmod-smoke
          - target: k7-vfs

    steps:
      - name: Checkout
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        uses: actions/checkout@v6

      - name: Host preflight
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        run: |
          test -c /dev/kvm
          test -c /dev/fuse

      - name: Mounted receipt-authority regression
        if: ${{ matrix.target == 'fuse' && (github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target) }}
        run: nix develop .#ci --command cargo test --locked -p tidefs-posix-filesystem-adapter-daemon --test receipt_authority_mount -- --nocapture

      - name: Prepare xfstests artifact root
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          WORK_ROOT: ${{ runner.temp }}/tidefs-xfstests-work/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf "$ARTIFACT_ROOT"
          rm -rf "$WORK_ROOT"
          mkdir -p "$ARTIFACT_ROOT"
          mkdir -p "$WORK_ROOT"
          {
            printf 'workflow=%s\n' "${GITHUB_WORKFLOW}"
            printf 'run_id=%s\n' "${GITHUB_RUN_ID}"
            printf 'run_attempt=%s\n' "${GITHUB_RUN_ATTEMPT}"
            printf 'job=%s\n' "${GITHUB_JOB}"
            printf 'target=%s\n' "${{ matrix.target }}"
            printf 'artifact_root=%s\n' "$ARTIFACT_ROOT"
            printf 'work_root=%s\n' "$WORK_ROOT"
            printf 'utc=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$ARTIFACT_ROOT/artifact-root.env"

      - name: Run target
        if: ${{ github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target }}
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          WORK_ROOT: ${{ runner.temp }}/tidefs-xfstests-work/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          XFSTESTS_TESTS: ${{ github.event_name == 'workflow_dispatch' && inputs.tests || '' }}
        run: |
          set -euo pipefail
          maybe_tests_args=()
          if [ -n "$XFSTESTS_TESTS" ]; then
            maybe_tests_args=(--tests "$XFSTESTS_TESTS")
          fi
          case "${{ matrix.target }}" in
            fuse)
              TIDEFS_FUSE_XFSTESTS_TMPDIR="$WORK_ROOT/fuse" \
                timeout --foreground 14400s \
                  nix run .#fuse-xfstests-validation -- \
                    "${maybe_tests_args[@]}" \
                    --output "$ARTIFACT_ROOT/validation.json"
              ;;
            kmod-smoke)
              TIDEFS_OUTPUT_ROOT="$ARTIFACT_ROOT" \
                timeout --foreground 14400s \
                  nix run .#kmod-xfstests-smoke -- \
                    --timeout 3600 \
                    "${maybe_tests_args[@]}"
              ;;
            k7-vfs)
              TIDEFS_K7_TFS_XFSTESTS_TMPDIR="$WORK_ROOT/k7-vfs" \
                timeout --foreground 14400s \
                  nix run .#k7-vfs-xfstests-validation -- \
                    "${maybe_tests_args[@]}" \
                    --output "$ARTIFACT_ROOT/validation.json"
              ;;
            *)
              echo "unknown xfstests target: ${{ matrix.target }}" >&2
              exit 2
              ;;
          esac

      - name: Write xfstests evidence manifest
        if: ${{ always() && (github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target) }}
        env:
          ARTIFACT_ROOT: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
          EVIDENCE_WORKFLOW: ${{ github.workflow }}
          EVIDENCE_RUN_ID: ${{ github.run_id }}
          EVIDENCE_RUN_ATTEMPT: ${{ github.run_attempt }}
          EVIDENCE_SOURCE_REF: ${{ github.ref }}
          EVIDENCE_SOURCE_SHA: ${{ github.sha }}
          EVIDENCE_TARGET: ${{ matrix.target }}
          EVIDENCE_TESTS_INPUT: ${{ inputs.tests || '' }}
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_ROOT"
          started_at=""
          if [ -f "$ARTIFACT_ROOT/artifact-root.env" ]; then
            started_at="$(awk -F= '$1 == "utc" {print substr($0, 5); exit}' "$ARTIFACT_ROOT/artifact-root.env")"
          fi
          finished_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          MANIFEST_NAME="xfstests-run-manifest.json"
          MANIFEST_PATH="$ARTIFACT_ROOT/$MANIFEST_NAME"

          normalize_kmod_smoke_tests() {
            local input="$1"
            local default_tests="authority/missing-pool configured-pool-member"
            local selected=""
            local saw_missing=0
            local saw_configured=0
            local input_without_space="${input//[[:space:]]/}"
            local test_name

            if [ -z "$input_without_space" ]; then
              printf '%s\n' "$default_tests"
              return 0
            fi

            for test_name in $input; do
              case "$test_name" in
                authority/missing-pool)
                  if [ "$saw_missing" -eq 0 ]; then
                    saw_missing=1
                    selected="$selected authority/missing-pool"
                  fi
                  ;;
                configured-pool-member)
                  if [ "$saw_configured" -eq 0 ]; then
                    saw_configured=1
                    selected="$selected configured-pool-member"
                  fi
                  ;;
                *)
                  printf '%s\n' "$test_name"
                  return 1
                  ;;
              esac
            done

            printf '%s\n' "${selected# }"
          }

          MANIFEST_TESTS_INPUT="${EVIDENCE_TESTS_INPUT:-}"
          SELECTION_ERROR=""
          if [ "$EVIDENCE_TARGET" = "kmod-smoke" ]; then
            if ! MANIFEST_TESTS_INPUT="$(normalize_kmod_smoke_tests "${EVIDENCE_TESTS_INPUT:-}")"; then
              SELECTION_ERROR="unsupported kmod-smoke test label: $MANIFEST_TESTS_INPUT"
              MANIFEST_TESTS_INPUT=""
            fi
          fi

          # Evidence scope: focused when supported tests are supplied, broad otherwise.
          tests_input_without_space="${EVIDENCE_TESTS_INPUT//[[:space:]]/}"
          if [ -n "$tests_input_without_space" ] && [ -z "$SELECTION_ERROR" ]; then
            evidence_scope="focused"
          else
            evidence_scope="broad"
          fi

          # Write manifest via jq when available, else fall back to a minimal valid manifest.
          if command -v jq >/dev/null 2>&1; then
            tests_json="$(printf '%s' "${MANIFEST_TESTS_INPUT:-}" | jq -R 'split(" ") | map(select(. != ""))')"
            artifact_paths_json="[]"
            if [ -d "$ARTIFACT_ROOT" ]; then
              artifact_paths_json="$(cd "$ARTIFACT_ROOT" && find . -type f -not -name "$MANIFEST_NAME" | sed 's|^\./||' | sort | jq -R -s 'split("\n") | map(select(. != ""))')"
            fi
            jq -n \
              --arg manifest_version "1" \
              --arg workflow "$EVIDENCE_WORKFLOW" \
              --arg run_id "$EVIDENCE_RUN_ID" \
              --arg run_attempt "$EVIDENCE_RUN_ATTEMPT" \
              --arg source_ref "$EVIDENCE_SOURCE_REF" \
              --arg source_sha "$EVIDENCE_SOURCE_SHA" \
              --arg target "$EVIDENCE_TARGET" \
              --arg evidence_scope "$evidence_scope" \
              --argjson tests "$tests_json" \
              --argjson artifact_paths "$artifact_paths_json" \
              --arg selection_error "$SELECTION_ERROR" \
              --arg started_at "$started_at" \
              --arg finished_at "$finished_at" \
              '{
                manifest_version: ($manifest_version | tonumber),
                workflow: $workflow,
                run_id: $run_id,
                run_attempt: $run_attempt,
                source_ref: $source_ref,
                source_sha: $source_sha,
                target: $target,
                evidence_scope: $evidence_scope
              }
              + if $tests != [] then {tests: $tests} else {} end
              + if $artifact_paths != [] then {artifact_paths: $artifact_paths} else {} end
              + if $selection_error != "" then {selection_error: $selection_error} else {} end
              + if $started_at != "" then {started_at: $started_at} else {} end
              + {finished_at: $finished_at}' \
              > "$MANIFEST_PATH"
          else
            json_string() {
              local escaped
              escaped="$(printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g')"
              printf '"%s"' "$escaped"
            }

            json_array_from_words() {
              local first=1
              local item
              printf '['
              for item in $1; do
                if [ "$first" -eq 1 ]; then
                  first=0
                else
                  printf ','
                fi
                json_string "$item"
              done
              printf ']'
            }

            json_array_from_lines() {
              local first=1
              local item
              printf '['
              while IFS= read -r item; do
                [ -n "$item" ] || continue
                if [ "$first" -eq 1 ]; then
                  first=0
                else
                  printf ','
                fi
                json_string "$item"
              done
              printf ']'
            }

            tests_json="$(json_array_from_words "${MANIFEST_TESTS_INPUT:-}")"
            artifact_paths_json="[]"
            if [ -d "$ARTIFACT_ROOT" ]; then
              artifact_paths_json="$(cd "$ARTIFACT_ROOT" && find . -type f -not -name "$MANIFEST_NAME" | sed 's|^\./||' | sort | json_array_from_lines)"
            fi
            started_at_field=""
            if [ -n "$started_at" ]; then
              started_at_field="\"started_at\": $(json_string "$started_at"),"
            fi
            selection_error_field=""
            if [ -n "$SELECTION_ERROR" ]; then
              selection_error_field="\"selection_error\": $(json_string "$SELECTION_ERROR"),"
            fi
            cat > "$MANIFEST_PATH" << MANIFEST_EOF
          {
            "manifest_version": 1,
            "workflow": $(json_string "$EVIDENCE_WORKFLOW"),
            "run_id": $(json_string "$EVIDENCE_RUN_ID"),
            "run_attempt": $(json_string "$EVIDENCE_RUN_ATTEMPT"),
            "source_ref": $(json_string "$EVIDENCE_SOURCE_REF"),
            "source_sha": $(json_string "$EVIDENCE_SOURCE_SHA"),
            "target": $(json_string "$EVIDENCE_TARGET"),
            "evidence_scope": $(json_string "$evidence_scope"),
            "tests": ${tests_json},
            "artifact_paths": ${artifact_paths_json},
            ${selection_error_field}
            ${started_at_field}
            "finished_at": $(json_string "$finished_at")
          }
          MANIFEST_EOF
          fi

          nix develop .#ci --command cargo run --locked -p tidefs-xtask -- validate-xfstests-evidence-manifest "$MANIFEST_PATH"
          {
            echo "## xfstests run-level evidence manifest"
            echo ""
            echo "- Target: \`$EVIDENCE_TARGET\`"
            echo "- Scope: \`$evidence_scope\`"
            echo "- Manifest: \`$MANIFEST_NAME\`"
            echo ""
            echo '```json'
            cat "$MANIFEST_PATH"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Upload xfstests output
        if: ${{ always() && (github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target) }}
        uses: actions/upload-artifact@v7
        with:
          name: xfstests-${{ matrix.target }}
          path: ${{ runner.temp }}/tidefs-xfstests-artifacts/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}/
          if-no-files-found: ignore
          retention-days: 7

      - name: Cleanup xfstests work root
        if: ${{ always() && (github.event_name == 'schedule' || inputs.target == 'all' || inputs.target == matrix.target) }}
        env:
          WORK_ROOT: ${{ runner.temp }}/tidefs-xfstests-work/${{ github.run_id }}-${{ github.run_attempt }}/${{ matrix.target }}
        run: |
          set -euo pipefail
          rm -rf "$WORK_ROOT"
