name: Codex Nexus Relay

on:
  issues:
    types: [opened, edited, reopened, closed, assigned, unassigned, labeled, unlabeled]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft, closed]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Nexus reconciles from live GitHub state, so any delivered relay wakeup is
  # enough to refresh the controller. Pull-request relay checks are telemetry,
  # not merge gates: keep any running delivery, but coalesce stale pending
  # wakeups per PR so event bursts do not queue one self-hosted runner job per
  # GitHub delivery. Other wakeups still share a global group.
  group: ${{ github.event_name == 'pull_request' && format('{0}-pull-request-{1}', github.workflow, github.event.pull_request.number) || github.workflow }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

jobs:
  relay:
    name: Relay event
    # PR metadata-only edits are not trigger types. Keep source-head and
    # lifecycle wakeups guarded here too, so future trigger expansions do not
    # accidentally allocate runners for metadata churn.
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          vars.TIDEFS_SELF_HOSTED_READY == '1' &&
          (
            github.event_name != 'pull_request' ||
            contains(fromJSON('["opened","synchronize","reopened","ready_for_review","converted_to_draft","closed"]'), github.event.action)
          )
        )
      }}
    runs-on: [self-hosted, linux, x64, tidefs]
    timeout-minutes: 5
    env:
      NEXUS_WEBHOOK_URL: http://172.16.106.12/tidefs-codex-nexus/webhook/github
      NEXUS_SECRET_FILE: /etc/tidefs-codex-nexus/webhook-secret

    steps:
      - name: Post signed event
        shell: bash
        run: |
          set -euo pipefail
          test -r "$GITHUB_EVENT_PATH"
          test -r "$NEXUS_SECRET_FILE"
          export PATH="/run/current-system/sw/bin:/usr/bin:/bin:${PATH:-}"
          perl_bin="$(command -v perl)"

          delivery="actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          signature="$(
            "$perl_bin" -MDigest::SHA=hmac_sha256_hex -e '
              my ($secret_path, $event_path) = @ARGV;
              open my $sfh, "<", $secret_path or die "open secret: $!";
              my $secret = <$sfh>;
              chomp $secret;
              local $/;
              open my $efh, "<", $event_path or die "open event: $!";
              my $payload = <$efh>;
              print "sha256=", hmac_sha256_hex($payload, $secret);
            ' "$NEXUS_SECRET_FILE" "$GITHUB_EVENT_PATH"
          )"

          curl --fail --show-error --silent --max-time 20 \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ${GITHUB_EVENT_NAME}" \
            -H "X-GitHub-Delivery: ${delivery}" \
            -H "X-Hub-Signature-256: ${signature}" \
            --data-binary @"$GITHUB_EVENT_PATH" \
            "$NEXUS_WEBHOOK_URL"
