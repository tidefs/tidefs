name: Dependency Advisory

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'deny.toml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'crates/*/Cargo.toml'
      - '.github/workflows/dependency-advisory.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  advisories:
    name: Dependency advisories
    # Draft PRs are not integration candidates; save scarce self-hosted runner
    # capacity for ready PRs, master pushes, and explicit dispatches.
    if: ${{ (github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: [self-hosted, linux, x64, tidefs, nix]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run cargo deny check advisories
        id: advisories
        continue-on-error: true
        run: |
          nix develop .#ci --command cargo deny check advisories --format json > advisories.json 2>advisories-stderr.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Report advisory summary
        if: always()
        run: |
          nix develop .#ci --command bash -c '
            {
              echo "## Dependency Advisory Check"
              echo ""
              echo "Policy: [deny.toml](deny.toml) \\\`[advisories]\\\`"
              echo ""

              if [[ ! -s advisories.json ]]; then
                echo ":warning: No JSON output captured."
                if [[ -s advisories-stderr.txt ]]; then
                  echo ""
                  echo "### stderr"
                  echo "\`\`\`"
                  cat advisories-stderr.txt
                  echo "\`\`\`"
                fi
                exit 0
              fi

              db_count=$(jq -r ".advisories.db[\"advisory-count\"] // 0" advisories.json 2>/dev/null || echo 0)
              db_updated=$(jq -r ".advisories.db[\"last-updated\"] // \"unknown\"" advisories.json 2>/dev/null || echo unknown)
              echo "- Advisory database: ${db_count} advisories (updated ${db_updated})"

              warn_count=$(jq -r ".advisories.warnings | length // 0" advisories.json 2>/dev/null || echo 0)
              err_count=$(jq -r ".advisories.errors | length // 0" advisories.json 2>/dev/null || echo 0)

              echo "- Warnings: ${warn_count}  |  Errors: ${err_count}"
              echo ""

              if [[ "$warn_count" -eq 0 && "$err_count" -eq 0 ]]; then
                echo ":white_check_mark: **No dependency advisories found.**"
                exit 0
              fi

              if [[ "$err_count" -gt 0 ]]; then
                echo "### :x: Blocking Advisories (${err_count})"
                echo ""
                echo "| Package | Advisory | Severity |"
                echo "|---------|----------|----------|"
                jq -r "
                  .advisories.errors[] |
                  \"| \\(.advisory.package // .package // \"unknown\") | [\\(.advisory.id // .id // \"unknown\")](\\(.advisory.url // \"\")) | \\(.advisory.severity // \"unknown\") |\"
                " advisories.json 2>/dev/null || echo "| *(parse error)* | | |"
                echo ""
              fi

              if [[ "$warn_count" -gt 0 ]]; then
                echo "### :warning: Warning Advisories (${warn_count})"
                echo ""
                echo "| Package | Advisory | Severity |"
                echo "|---------|----------|----------|"
                jq -r "
                  .advisories.warnings[] |
                  \"| \\(.advisory.package // .package // \"unknown\") | [\\(.advisory.id // .id // \"unknown\")](\\(.advisory.url // \"\")) | \\(.advisory.severity // \"unknown\") |\"
                " advisories.json 2>/dev/null || echo "| *(parse error)* | | |"
                echo ""
              fi

              echo "See [DEPENDENCY_ADVISORY_CI.md](docs/DEPENDENCY_ADVISORY_CI.md) for policy and remediation guidance."
            } >> "$GITHUB_STEP_SUMMARY"
          '

      - name: Upload advisory report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-advisory-report
          path: |
            advisories.json
            advisories-stderr.txt
          if-no-files-found: ignore
          retention-days: 7
