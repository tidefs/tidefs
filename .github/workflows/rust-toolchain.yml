name: Rust Toolchain

on:
  push:
    branches: [master]
    paths:
      - 'rust-toolchain.toml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/rust-toolchain.yml'
      - 'docs/RUST_TOOLCHAIN_CI.md'
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'rust-toolchain.toml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/rust-toolchain.yml'
      - 'docs/RUST_TOOLCHAIN_CI.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Rust toolchain
    # Draft PRs are not integration candidates; save scarce self-hosted runner
    # capacity for ready PRs, master pushes, and explicit dispatches.
    if: ${{ (github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: [self-hosted, linux, x64, tidefs, nix]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify pinned toolchain and components
        run: |
          nix develop .#ci --command bash -c '
            set -uo pipefail

            # ------------------------------------------------------------------
            # Parse the expected Rust channel from rust-toolchain.toml
            # ------------------------------------------------------------------
            EXPECTED_CHANNEL=$(grep "^channel" rust-toolchain.toml \
              | sed "s/channel\s*=\s*\"\([^\"]*\)\"/\1/")
            if [[ -z "${EXPECTED_CHANNEL}" ]]; then
              echo "::error::Could not parse channel from rust-toolchain.toml"
              exit 1
            fi

            # ------------------------------------------------------------------
            # Verify rustc channel through structured verbose output. The
            # release line gives the canonical channel (e.g. "1.88.0") and
            # the commit hash allows cross-checking that sibling components
            # were built from the same toolchain commit.
            # ------------------------------------------------------------------
            set +e
            RUSTC_VV=$(rustc -Vv 2>&1)
            RUSTC_RC=$?
            set -e

            if [[ $RUSTC_RC -ne 0 ]]; then
              echo "::error::rustc not available: ${RUSTC_VV}"
              exit 1
            fi

            RUSTC_RELEASE=$(echo "${RUSTC_VV}" | grep "^release:" | awk "{print \$2}")
            RUSTC_COMMIT=$(echo "${RUSTC_VV}" | grep "^commit-hash:" | awk "{print \$2}")
            RUSTC_HOST=$(echo "${RUSTC_VV}" | grep "^host:" | awk "{print \$2}")

            if [[ "${RUSTC_RELEASE}" != "${EXPECTED_CHANNEL}" ]]; then
              echo "::error::rustc release ${RUSTC_RELEASE} does not match expected channel ${EXPECTED_CHANNEL}"
              exit 1
            fi

            # ------------------------------------------------------------------
            # Write the job summary header
            # ------------------------------------------------------------------
            {
              echo "## Rust Toolchain Verification"
              echo ""
              echo "**Expected channel:** \`${EXPECTED_CHANNEL}\`"
              echo "**Host triple:** \`${RUSTC_HOST}\`"
              echo "**Commit:** \`${RUSTC_COMMIT}\`"
              echo ""
              echo "| Component | Observed |"
              echo "|-----------|----------|"
              echo "| rustc | \`${RUSTC_RELEASE} (${RUSTC_COMMIT})\` |"
            } >> "$GITHUB_STEP_SUMMARY"

            failures=0

            # ------------------------------------------------------------------
            # Helper: check that a component command exists and records the
            # first line of its version output.  Component version strings
            # (e.g. clippy 0.1.88, rustfmt 1.8.0-stable) use their own
            # numbering; the channel is already verified through rustc above.
            # ------------------------------------------------------------------
            check_component() {
              local label="$1"
              local ver_cmd="$2"

              set +e
              local out
              out=$(eval "${ver_cmd}" 2>&1)
              local rc=$?
              set -e

              local first_line
              first_line=$(echo "${out}" | head -n1)

              if [[ $rc -ne 0 ]]; then
                echo "| ${label} | **UNAVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
                echo "::error::${label} not available: ${first_line}"
                failures=$((failures + 1))
              else
                echo "| ${label} | \`${first_line}\` |" >> "$GITHUB_STEP_SUMMARY"
              fi
            }

            check_component "cargo"   "cargo --version"
            check_component "clippy"  "cargo clippy --version"
            check_component "rustfmt" "rustfmt --version"

            # ------------------------------------------------------------------
            # rust-src: the component installs the standard library source
            # under the sysroot.  Check the same path used by the existing
            # kernel Kbuild toolchain verification
            # (nix/vm/k7-kbuild-toolchain.nix).
            # ------------------------------------------------------------------
            set +e
            SYSROOT=$(rustc --print sysroot 2>&1)
            rc=$?
            set -e
            if [[ $rc -ne 0 ]]; then
              echo "| rust-src | **UNAVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Could not determine sysroot: ${SYSROOT}"
              failures=$((failures + 1))
            elif [[ -d "${SYSROOT}/lib/rustlib/src/rust" ]]; then
              echo "| rust-src | available |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| rust-src | **MISSING** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::rust-src component not found in sysroot ${SYSROOT}"
              failures=$((failures + 1))
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [[ "${failures}" -gt 0 ]]; then
              echo "**${failures} component(s) failed verification**" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Toolchain verification failed with ${failures} mismatch(es)"
              exit 1
            fi

            echo "**All components verified for channel \`${EXPECTED_CHANNEL}\`**" \
              >> "$GITHUB_STEP_SUMMARY"
          '
