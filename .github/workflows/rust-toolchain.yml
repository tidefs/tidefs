name: Rust Toolchain

on:
  push:
    branches: [master]
    paths:
      - 'rust-toolchain.toml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/rust-toolchain.yml'
      - 'docs/RUST_TOOLCHAIN_CI.md'
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'rust-toolchain.toml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/rust-toolchain.yml'
      - 'docs/RUST_TOOLCHAIN_CI.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Rust toolchain
    # Draft PRs are not integration candidates; save scarce self-hosted runner
    # capacity for ready PRs, master pushes, and explicit dispatches.
    if: ${{ (github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: [self-hosted, linux, x64, tidefs, nix]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify pinned toolchain and components
        run: |
          nix develop .#ci --command bash -c '
            set -uo pipefail

            # Extract the expected Rust channel from rust-toolchain.toml.
            EXPECTED_CHANNEL=$(grep "^channel" rust-toolchain.toml \
              | sed "s/channel\s*=\s*\"\([^\"]*\)\"/\1/")
            if [[ -z "${EXPECTED_CHANNEL}" ]]; then
              echo "::error::Could not parse channel from rust-toolchain.toml"
              exit 1
            fi

            {
              echo "## Rust Toolchain Verification"
              echo ""
              echo "**Expected channel:** \`${EXPECTED_CHANNEL}\`"
              echo ""
              echo "| Component | Observed |"
              echo "|-----------|----------|"
            } >> "$GITHUB_STEP_SUMMARY"

            failures=0

            # ------------------------------------------------------------------
            # rustc
            # ------------------------------------------------------------------
            set +e
            RUSTC_VERSION=$(rustc --version 2>&1)
            rc=$?
            set -e
            if [[ $rc -ne 0 ]]; then
              echo "| rustc | **UNAVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::rustc not available: ${RUSTC_VERSION}"
              failures=$((failures + 1))
            elif ! echo "${RUSTC_VERSION}" | grep -q "rustc ${EXPECTED_CHANNEL}"; then
              echo "| rustc | \`${RUSTC_VERSION}\` :x: |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::rustc version ${RUSTC_VERSION} does not match expected channel ${EXPECTED_CHANNEL}"
              failures=$((failures + 1))
            else
              echo "| rustc | \`${RUSTC_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
            fi

            # ------------------------------------------------------------------
            # cargo
            # ------------------------------------------------------------------
            set +e
            CARGO_VERSION=$(cargo --version 2>&1)
            rc=$?
            set -e
            if [[ $rc -ne 0 ]]; then
              echo "| cargo | **UNAVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::cargo not available: ${CARGO_VERSION}"
              failures=$((failures + 1))
            elif ! echo "${CARGO_VERSION}" | grep -q "cargo ${EXPECTED_CHANNEL}"; then
              echo "| cargo | \`${CARGO_VERSION}\` :x: |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::cargo version ${CARGO_VERSION} does not match expected channel ${EXPECTED_CHANNEL}"
              failures=$((failures + 1))
            else
              echo "| cargo | \`${CARGO_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
            fi

            # ------------------------------------------------------------------
            # clippy
            # ------------------------------------------------------------------
            set +e
            CLIPPY_VERSION=$(cargo clippy --version 2>&1)
            rc=$?
            set -e
            if [[ $rc -ne 0 ]]; then
              echo "| clippy | **UNAVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::clippy not available: ${CLIPPY_VERSION}"
              failures=$((failures + 1))
            elif ! echo "${CLIPPY_VERSION}" | grep -q "clippy ${EXPECTED_CHANNEL}"; then
              echo "| clippy | \`${CLIPPY_VERSION}\` :x: |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::clippy version ${CLIPPY_VERSION} does not match expected channel ${EXPECTED_CHANNEL}"
              failures=$((failures + 1))
            else
              echo "| clippy | \`${CLIPPY_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
            fi

            # ------------------------------------------------------------------
            # rustfmt
            # ------------------------------------------------------------------
            set +e
            RUSTFMT_VERSION=$(rustfmt --version 2>&1)
            rc=$?
            set -e
            if [[ $rc -ne 0 ]]; then
              echo "| rustfmt | **UNAVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::rustfmt not available: ${RUSTFMT_VERSION}"
              failures=$((failures + 1))
            elif ! echo "${RUSTFMT_VERSION}" | grep -q "rustfmt ${EXPECTED_CHANNEL}"; then
              echo "| rustfmt | \`${RUSTFMT_VERSION}\` :x: |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::rustfmt version ${RUSTFMT_VERSION} does not match expected channel ${EXPECTED_CHANNEL}"
              failures=$((failures + 1))
            else
              echo "| rustfmt | \`${RUSTFMT_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
            fi

            # ------------------------------------------------------------------
            # rust-src
            # ------------------------------------------------------------------
            set +e
            SYSROOT=$(rustc --print sysroot 2>&1)
            rc=$?
            set -e
            if [[ $rc -ne 0 ]]; then
              echo "| rust-src | **UNAVAILABLE** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Could not determine sysroot: ${SYSROOT}"
              failures=$((failures + 1))
            elif [[ -d "${SYSROOT}/lib/rustlib/src/rust" ]]; then
              echo "| rust-src | available |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| rust-src | **MISSING** |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::rust-src component not found in sysroot ${SYSROOT}"
              failures=$((failures + 1))
            fi

            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [[ "${failures}" -gt 0 ]]; then
              echo "**${failures} component(s) failed verification**" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Toolchain verification failed with ${failures} mismatch(es)"
              exit 1
            fi

            echo "**All components verified for channel \`${EXPECTED_CHANNEL}\`**" \
              >> "$GITHUB_STEP_SUMMARY"
          '
