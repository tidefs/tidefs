name: Rust Fast

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'COPYING'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /var/tmp/tidefs-ci/cargo-home
  CARGO_INCREMENTAL: 0
  CARGO_TEST_FLAGS: --locked
  CARGO_TARGET_DIR: /var/tmp/tidefs-ci/cargo-target/${{ github.run_id }}-${{ github.run_attempt }}
  RUST_BACKTRACE: 1
  TIDEFS_RUST_FAST_CRATES: tidefs-xtask,tidefs-extent-map,tidefs-schema-codec-posix-filesystem-adapter,tidefs-secret-key-policy-runtime

jobs:
  workspace:
    name: Workspace
    # Draft PRs are not integration candidates; save scarce self-hosted runner
    # capacity for ready PRs, master pushes, and explicit dispatches.
    if: ${{ (github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: [self-hosted, linux, x64, tidefs, nix]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare CI scratch
        run: |
          mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"

      - name: Check workspace metadata
        run: nix develop .#ci --command bash -c 'cargo metadata --locked --format-version 1 --no-deps >/dev/null'

      - name: Check doc authority drift
        continue-on-error: true
        run: nix develop .#ci --command bash -c 'cargo run -p tidefs-xtask -- check-doc-authority-drift'

      - name: Run selected crate tests
        run: nix develop .#ci --command bash -c './scripts/ci-test-runner.sh --crates "$TIDEFS_RUST_FAST_CRATES" --json ci-test-summary.json'

      - name: Run transport smoke test
        run: nix develop .#ci --command bash -c 'cargo test -p tidefs-transport --locked send_message_missing_session_fails'

      - name: Upload test summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-fast-summary
          path: ci-test-summary.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Report summary
        if: always()
        run: |
          if [[ -f ci-test-summary.json ]]; then
            echo '## Workspace Test Results' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            nix develop .#ci --command jq -c '.[] | {crate, status, tests}' ci-test-summary.json >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            failed=$(nix develop .#ci --command jq '[.[] | select(.status != "pass")] | length' ci-test-summary.json)
            echo "**$failed crate(s) did not pass**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Clean cargo target
        if: always()
        run: rm -rf "$CARGO_TARGET_DIR"
