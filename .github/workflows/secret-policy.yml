name: Secret Policy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  no-github-secrets:
    runs-on: [self-hosted, linux, x64, tidefs, nix]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Reject GitHub secret references
        shell: bash
        run: |
          pattern='secrets[[:space:]]*[.]'
          if grep -RE "$pattern" .github --exclude-dir=.git; then
            echo "TideFS policy forbids the GitHub Actions secret context."
            exit 1
          fi
