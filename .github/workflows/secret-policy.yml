name: Secret Policy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - 'docs/GITHUB_CI.md'
      - 'AGENTS.md'
      - 'xtask/tidefs-xtask/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /var/tmp/tidefs-ci/cargo-home
  CARGO_INCREMENTAL: 0
  CARGO_TARGET_DIR: /var/tmp/tidefs-ci/cargo-target/${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  no-github-secrets:
    # Draft PRs are not integration candidates; save scarce self-hosted runner
    # capacity for ready PRs, master pushes, and explicit dispatches.
    if: ${{ (github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1') && (github.event_name != 'pull_request' || github.event.pull_request.draft == false) }}
    runs-on: [self-hosted, linux, x64, tidefs, nix]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare CI scratch
        run: mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"

      - name: Exercise seeded violation fixtures
        run: |
          nix develop .#ci --command bash -c 'cargo run -p tidefs-xtask -- check-secret-policy --seeded-violation-fixtures'

      - name: Scan for forbidden GitHub secret surfaces
        run: |
          nix develop .#ci --command bash -c 'cargo run -p tidefs-xtask -- check-secret-policy'

      - name: Clean cargo target
        if: always()
        run: rm -rf "$CARGO_TARGET_DIR"
