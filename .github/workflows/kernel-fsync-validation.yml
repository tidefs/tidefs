name: Kernel fsync/syncfs validation

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: QEMU boot timeout per phase in seconds
        required: false
        default: "600"
        type: string
      pool_size_mb:
        description: Backing pool disk size in MB
        required: false
        default: "256"
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fsync:
    name: Kernel fsync/syncfs durability row
    runs-on: [self-hosted, linux, x64, tidefs, nix, kvm]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Host preflight
        run: |
          test -c /dev/kvm || { echo "BLOCKED: /dev/kvm not available on this runner"; exit 1; }
          echo "KVM available: $(ls -la /dev/kvm)"

      - name: Prepare validation output
        run: |
          rm -rf /tmp/tidefs-kmod-fsync-validation /tmp/tidefs-validation/kernel-fsync-validation
          mkdir -p /tmp/tidefs-validation/kernel-fsync-validation

      - name: Run kernel fsync/syncfs validation
        id: fsync
        env:
          TIDEFS_FSYNC_SUMMARY_DIR: /tmp/tidefs-validation/kernel-fsync-validation
        run: |
          timeout --foreground 7200s nix run .#kernel-fsync-validation -- \
            --timeout "${{ inputs.timeout_seconds }}" \
            --pool-size "${{ inputs.pool_size_mb }}"

      - name: Write evidence manifest
        if: always()
        env:
          TIDEFS_FSYNC_SUMMARY_DIR: /tmp/tidefs-validation/kernel-fsync-validation
        run: |
          set -euo pipefail

          SUMMARY_DIR="$TIDEFS_FSYNC_SUMMARY_DIR"
          mkdir -p "$SUMMARY_DIR"
          MANIFEST_PATH="$SUMMARY_DIR/evidence-manifest.json"
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RUN_ID="${{ github.run_id }}/${{ github.run_attempt }}"
          SOURCE_REF="${{ github.sha }}"
          TIMEOUT="${{ inputs.timeout_seconds }}"
          POOL_SIZE="${{ inputs.pool_size_mb }}"

          CLAIM_ID="kernel.fsync.durability.v1"
          EVIDENCE_CLASS="runtime-kernel-fsync-validation"
          SOURCE_LABEL="kernel-fsync-validation"
          SCOPE_BASE="kernel-fsync-syncfs-durability-across-qemu-power-loss-cycle"

          # Locate the latest summary.env
          LATEST_SUMMARY="$(find "$SUMMARY_DIR" -name summary.env -type f 2>/dev/null | sort | tail -1 || true)"
          LOG_PATHS="$(find "$SUMMARY_DIR" -name '*.log' -type f -printf '%P\n' 2>/dev/null | sort | paste -sd ',' - || true)"
          if [[ -z "$LOG_PATHS" ]]; then
            LOG_PATHS="none"
          fi

          if [[ -n "$LATEST_SUMMARY" && -f "$LATEST_SUMMARY" ]]; then
            read_summary_value() {
              local key="$1"
              local default="$2"
              awk -F= -v key="$key" -v default="$default" '
                $1 == key { print $2; found = 1; exit }
                END { if (!found) print default }
              ' "$LATEST_SUMMARY"
            }

            # Parse pass/fail/blocked counts from summary.env
            PASSED="$(read_summary_value TIDEFS_FSYNC_PASSED 0)"
            FAILED="$(read_summary_value TIDEFS_FSYNC_FAILED 0)"
            BLOCKED="$(read_summary_value TIDEFS_FSYNC_BLOCKED 0)"
            STATUS="$(read_summary_value TIDEFS_FSYNC_STATUS UNKNOWN)"

            [[ "$PASSED" =~ ^[0-9]+$ ]] || PASSED=0
            [[ "$FAILED" =~ ^[0-9]+$ ]] || FAILED=0
            [[ "$BLOCKED" =~ ^[0-9]+$ ]] || BLOCKED=0

            if [[ "$FAILED" -gt 0 || "$STATUS" == "FAIL" ]]; then
              STATUS_LABEL="fail"
              OUTCOME="product-fail"
            elif [[ "$BLOCKED" -gt 0 || "$STATUS" == "BLOCKED" ]]; then
              STATUS_LABEL="blocked"
              OUTCOME="environment-refusal"
            elif [[ "$PASSED" -gt 0 || "$STATUS" == "PASS" ]]; then
              STATUS_LABEL="pass"
              OUTCOME="pass"
            else
              STATUS_LABEL="no-result"
              OUTCOME="harness-fail"
            fi

            ARTIFACT_PATH="$(realpath --relative-to="$SUMMARY_DIR" "$LATEST_SUMMARY" 2>/dev/null || echo summary.env)"
            PRIMARY_PATH="$LATEST_SUMMARY"
          else
            PASSED=0
            FAILED=0
            BLOCKED=0
            STATUS_LABEL="no-summary"
            OUTCOME="harness-fail"
            ARTIFACT_PATH="summary.env.missing"
            PRIMARY_PATH="$SUMMARY_DIR/$ARTIFACT_PATH"
            {
              printf 'status=missing-summary\n'
              printf 'workflow=%s\n' "${{ github.workflow }}"
              printf 'run_id=%s\n' "$RUN_ID"
              printf 'source_ref=%s\n' "$SOURCE_REF"
              printf 'timeout_seconds=%s\n' "$TIMEOUT"
              printf 'pool_size_mb=%s\n' "$POOL_SIZE"
            } > "$PRIMARY_PATH"

            echo "## Evidence manifest: no summary.env found" >> "$GITHUB_STEP_SUMMARY"
          fi

          DIGEST="$(nix shell nixpkgs#b3sum --command b3sum "$PRIMARY_PATH" | awk '{print $1}')"
          CONTENT_DIGEST="blake3:${DIGEST}"
          RESIDUAL_RISK="Kernel fsync evidence is bounded to fsync/syncfs durability across one QEMU power-loss validation row with timeout=${TIMEOUT}s and pool=${POOL_SIZE}MB; it does not close broader mounted kernel, xfstests, RDMA, or release-candidate evidence."
          SCOPE="${SCOPE_BASE} status=${STATUS_LABEL} passed=${PASSED} failed=${FAILED} blocked=${BLOCKED} run=${RUN_ID} source=${SOURCE_REF} timeout=${TIMEOUT}s pool=${POOL_SIZE}MB summary_path=${ARTIFACT_PATH} log_paths=${LOG_PATHS}"

          jq -n \
            --arg claim_id "$CLAIM_ID" \
            --arg evidence_class "$EVIDENCE_CLASS" \
            --arg validation_tier "full-kernel-no-daemon" \
            --arg scope "$SCOPE" \
            --arg artifact_path "$ARTIFACT_PATH" \
            --arg content_digest "$CONTENT_DIGEST" \
            --arg run_id "$RUN_ID" \
            --arg source_ref "$SOURCE_REF" \
            --arg outcome "$OUTCOME" \
            --arg residual_risk "$RESIDUAL_RISK" \
            --arg source "$SOURCE_LABEL" \
            --arg generated_at "$GENERATED_AT" \
            '{
              manifest_version: 2,
              claim_id: $claim_id,
              evidence_class: $evidence_class,
              validation_tier: $validation_tier,
              scope: $scope,
              artifact_path: $artifact_path,
              content_digest: $content_digest,
              run_id: $run_id,
              source_ref: $source_ref,
              outcome: $outcome,
              residual_risk: $residual_risk,
              source: $source,
              generated_at: $generated_at,
              blocking_issues: []
            }' > "$MANIFEST_PATH"

          nix develop .#ci --command cargo run --locked -p tidefs-xtask -- validate-evidence-manifest "$MANIFEST_PATH"

          echo "## Evidence manifest written and validated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "$MANIFEST_PATH" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fsync validation logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kernel-fsync-validation
          path: |
            /tmp/tidefs-kmod-fsync-validation/**
            /tmp/tidefs-validation/kernel-fsync-validation/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Report summary
        if: always()
        run: |
          echo "## Kernel fsync/syncfs durability validation" >> "$GITHUB_STEP_SUMMARY"
          latest=$(find /tmp/tidefs-validation/kernel-fsync-validation -name summary.env -type f 2>/dev/null | sort | tail -1 || true)
          if [[ -n "$latest" && -f "$latest" ]]; then
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat "$latest" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No summary.env artifact was produced." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Validation logs uploaded as artifact: kernel-fsync-validation" >> "$GITHUB_STEP_SUMMARY"
          if [[ -f /tmp/tidefs-validation/kernel-fsync-validation/evidence-manifest.json ]]; then
            echo "Evidence manifest uploaded as artifact: kernel-fsync-validation/evidence-manifest.json" >> "$GITHUB_STEP_SUMMARY"
          fi
