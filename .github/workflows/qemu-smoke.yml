name: QEMU Smoke

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: Smoke target to run
        required: false
        default: kmod-xfstests-smoke
        type: choice
        options:
          - kmod-xfstests-smoke
          - kernel-fsync-validation
          - kernel-mmap-validation
          - qemu-ublk-smoke
          - all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.name }}
    if: ${{ github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1' }}
    runs-on: [self-hosted, linux, x64, tidefs, nix, kvm]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: kmod-xfstests-smoke
            name: kmod-xfstests-smoke
            command: nix run .#kmod-xfstests-smoke -- --timeout 1800
            output_dir: /tmp/tidefs-validation/kmod-xfstests-smoke
          - id: kernel-fsync-validation
            name: kernel-fsync-validation
            command: nix run .#kernel-fsync-validation -- --timeout 600 --pool-size 256
            output_dir: /tmp/tidefs-validation/kernel-fsync-validation
          - id: kernel-mmap-validation
            name: kernel-mmap-validation
            command: nix run .#kernel-mmap-validation -- --timeout 900
            output_dir: /tmp/tidefs-validation/kernel-mmap-validation
          - id: qemu-ublk-smoke
            name: qemu-ublk-smoke
            command: nix run .#qemu-ublk-smoke -- --timeout 3600
            output_dir: /tmp/tidefs-validation/ublk

    steps:
      - name: Checkout
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        uses: actions/checkout@v6

      - name: Host preflight
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        run: |
          test -c /dev/kvm
          test -c /dev/fuse

      - name: Prepare runtime output
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        run: |
          rm -rf '${{ matrix.output_dir }}'
          mkdir -p '${{ matrix.output_dir }}'

      - name: Run smoke target
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        env:
          TIDEFS_FSYNC_SUMMARY_DIR: ${{ matrix.output_dir }}
        run: timeout --foreground 7200s bash -lc '${{ matrix.command }}'

      - name: Upload runtime output
        if: ${{ always() && ((github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke')) }}
        uses: actions/upload-artifact@v7
        with:
          name: qemu-smoke-${{ matrix.name }}
          path: |
            ${{ matrix.output_dir }}/**
          if-no-files-found: ignore
          retention-days: 7
