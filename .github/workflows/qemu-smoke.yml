name: QEMU Smoke

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: Smoke target to run
        required: false
        default: kmod-xfstests-smoke
        type: choice
        options:
          - kmod-xfstests-smoke
          - kernel-fsync-validation
          - kernel-mmap-validation
          - kernel-teardown-validation
          - kernel-no-daemon-teardown-validation
          - two-node-carrier-validation
          - fuse-vm-test
          - qemu-ublk-smoke
          - qemu-ublk-qid-tag-runtime
          - receipt-bound-reclaim-runtime
          - scrub-foreground-read-runtime
          - all

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.name }}
    if: ${{ github.event_name == 'workflow_dispatch' || vars.TIDEFS_SELF_HOSTED_READY == '1' }}
    runs-on: [self-hosted, linux, x64, tidefs, nix, kvm]
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      CARGO_HOME: /var/tmp/tidefs-ci/cargo-home
      CARGO_INCREMENTAL: 0
      CARGO_TARGET_DIR: /var/tmp/tidefs-ci/cargo-target/${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.id }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: kmod-xfstests-smoke
            name: kmod-xfstests-smoke
            command: nix run .#kmod-xfstests-smoke -- --timeout 1800
            output_dir: /tmp/tidefs-validation/kmod-xfstests-smoke
          - id: kernel-teardown-validation
            name: kernel-teardown-validation
            command: nix run .#kernel-teardown-validation -- --timeout 600
            output_dir: /tmp/tidefs-validation/kernel-teardown-validation
          - id: kernel-fsync-validation
            name: kernel-fsync-validation
            command: nix run .#kernel-fsync-validation -- --timeout 600 --pool-size 256
            output_dir: /tmp/tidefs-validation/kernel-fsync-validation
          - id: kernel-mmap-validation
            name: kernel-mmap-validation
            command: nix run .#kernel-mmap-validation -- --timeout 900
            output_dir: /tmp/tidefs-validation/kernel-mmap-validation
          - id: kernel-no-daemon-teardown-validation
            name: kernel-no-daemon-teardown-validation
            command: nix run .#kernel-no-daemon-teardown-validation -- --timeout 600
            output_dir: /tmp/tidefs-validation/kernel-no-daemon-teardown-validation
          - id: two-node-carrier-validation
            name: two-node-carrier-validation
            command: nix run .#two-node-carrier-validation -- --timeout 600 --validation-dir /tmp/tidefs-validation/two-node-carrier-validation
            output_dir: /tmp/tidefs-validation/two-node-carrier-validation
          - id: fuse-vm-test
            name: fuse-vm-test
            command: nix run .#fuse-vm-test -- --timeout 900 --validation-dir /tmp/tidefs-validation/fuse-vm-test --queue-depth-artifact /tmp/tidefs-validation/fuse-vm-test/performance/queue-depth-runtime.json
            output_dir: /tmp/tidefs-validation/fuse-vm-test
          - id: qemu-ublk-smoke
            name: qemu-ublk-smoke
            command: nix run .#qemu-ublk-smoke -- --timeout 3600
            output_dir: /tmp/tidefs-validation/ublk
          - id: qemu-ublk-qid-tag-runtime
            name: qemu-ublk-qid-tag-runtime
            command: nix run .#qemu-ublk-qid-tag-runtime -- --timeout 3600 --validation-dir /tmp/tidefs-validation/ublk-qid-tag-runtime
            output_dir: /tmp/tidefs-validation/ublk-qid-tag-runtime
          - id: receipt-bound-reclaim-runtime
            name: receipt-bound-reclaim-runtime
            command: nix develop .#ci --command cargo run --locked -p tidefs-validation --features receipt-bound-physical-reclaim --bin receipt-bound-reclaim-validation -- --row receipt-bound-obsolete-location-trim --output-dir /tmp/tidefs-validation/receipt-bound-reclaim-runtime
            output_dir: /tmp/tidefs-validation/receipt-bound-reclaim-runtime
          - id: scrub-foreground-read-runtime
            name: scrub-foreground-read-runtime
            command: nix run .#scrub-foreground-read-runtime -- --row scrub-foreground-read-runtime --output-dir /tmp/tidefs-validation/scrub-foreground-read-runtime
            output_dir: /tmp/tidefs-validation/scrub-foreground-read-runtime

    steps:
      - name: Checkout
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        uses: actions/checkout@v6

      - name: Host preflight
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        run: |
          if [[ '${{ matrix.id }}' == 'scrub-foreground-read-runtime' ]]; then
            exit 0
          fi
          test -c /dev/kvm
          test -c /dev/fuse

      - name: Prepare runtime output
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        run: |
          rm -rf '${{ matrix.output_dir }}'
          mkdir -p '${{ matrix.output_dir }}'
          mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"

      - name: Run smoke target
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke') }}
        env:
          TIDEFS_FSYNC_SUMMARY_DIR: ${{ matrix.output_dir }}
          TIDEFS_TEARDOWN_OUTPUT_DIR: ${{ matrix.output_dir }}
          TIDEFS_NO_DAEMON_TEARDOWN_OUTPUT_DIR: ${{ matrix.output_dir }}
        run: |
          TIDEFS_GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export TIDEFS_GENERATED_AT
          timeout --foreground 7200s bash -lc '${{ matrix.command }}'

      - name: Write kernel-fsync evidence manifest (smoke)
        if: ${{ always() && matrix.id == 'kernel-fsync-validation' && github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'kernel-fsync-validation') }}
        run: |
          set -euo pipefail

          SUMMARY_DIR="${{ matrix.output_dir }}"
          mkdir -p "$SUMMARY_DIR"
          MANIFEST_PATH="$SUMMARY_DIR/evidence-manifest.json"
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          RUN_ID="${{ github.run_id }}/${{ github.run_attempt }}"
          SOURCE_REF="${{ github.sha }}"

          CLAIM_ID="kernel.fsync.durability.v1"
          EVIDENCE_CLASS="runtime-kernel-fsync-validation"
          SOURCE_LABEL="qemu-smoke-kernel-fsync-validation"
          SCOPE_BASE="kernel-fsync-syncfs-durability-across-qemu-power-loss-cycle"

          LATEST_SUMMARY="$(find "$SUMMARY_DIR" -name summary.env -type f 2>/dev/null | sort | tail -1 || true)"
          LOG_PATHS="$(find "$SUMMARY_DIR" -name '*.log' -type f -printf '%P\n' 2>/dev/null | sort | paste -sd ',' - || true)"
          if [[ -z "$LOG_PATHS" ]]; then
            LOG_PATHS="none"
          fi

          read_summary_value() {
            local key="$1"
            local default="$2"
            awk -F= -v key="$key" -v default="$default" '
              $1 == key { print $2; found = 1; exit }
              END { if (!found) print default }
            ' "$LATEST_SUMMARY"
          }

          if [[ -n "$LATEST_SUMMARY" && -f "$LATEST_SUMMARY" ]]; then
            PASSED="$(read_summary_value TIDEFS_FSYNC_PASSED 0)"
            FAILED="$(read_summary_value TIDEFS_FSYNC_FAILED 0)"
            BLOCKED="$(read_summary_value TIDEFS_FSYNC_BLOCKED 0)"
            STATUS="$(read_summary_value TIDEFS_FSYNC_STATUS UNKNOWN)"

            [[ "$PASSED" =~ ^[0-9]+$ ]] || PASSED=0
            [[ "$FAILED" =~ ^[0-9]+$ ]] || FAILED=0
            [[ "$BLOCKED" =~ ^[0-9]+$ ]] || BLOCKED=0

            if [[ "$FAILED" -gt 0 || "$STATUS" == "FAIL" ]]; then
              STATUS_LABEL="fail"
              OUTCOME="product-fail"
            elif [[ "$BLOCKED" -gt 0 || "$STATUS" == "BLOCKED" ]]; then
              STATUS_LABEL="blocked"
              OUTCOME="environment-refusal"
            elif [[ "$PASSED" -gt 0 || "$STATUS" == "PASS" ]]; then
              STATUS_LABEL="pass"
              OUTCOME="pass"
            else
              STATUS_LABEL="no-result"
              OUTCOME="harness-fail"
            fi

            ARTIFACT_PATH="$(realpath --relative-to="$SUMMARY_DIR" "$LATEST_SUMMARY" 2>/dev/null || echo summary.env)"
            PRIMARY_PATH="$LATEST_SUMMARY"
          else
            PASSED=0
            FAILED=0
            BLOCKED=0
            STATUS_LABEL="no-summary"
            OUTCOME="harness-fail"
            ARTIFACT_PATH="summary.env.missing"
            PRIMARY_PATH="$SUMMARY_DIR/$ARTIFACT_PATH"
            {
              printf 'status=missing-summary\n'
              printf 'workflow=%s\n' "${{ github.workflow }}"
              printf 'run_id=%s\n' "$RUN_ID"
              printf 'source_ref=%s\n' "$SOURCE_REF"
            } > "$PRIMARY_PATH"
            echo "## Evidence manifest: no summary.env found" >> "$GITHUB_STEP_SUMMARY"
          fi

          DIGEST="$(nix shell nixpkgs#b3sum --command b3sum "$PRIMARY_PATH" | awk '{print $1}')"
          CONTENT_DIGEST="blake3:${DIGEST}"
          RESIDUAL_RISK="QEMU Smoke kernel-fsync output is diagnostic; the standalone kernel-fsync-validation workflow remains the claims-gate authority, and this artifact does not broaden runtime coverage by itself."
          SCOPE="${SCOPE_BASE} source=qemu-smoke (claims-gate authority is standalone kernel-fsync-validation workflow) status=${STATUS_LABEL} passed=${PASSED} failed=${FAILED} blocked=${BLOCKED} run=${RUN_ID} ref=${SOURCE_REF} summary_path=${ARTIFACT_PATH} log_paths=${LOG_PATHS}"

          jq -n \
            --arg claim_id "$CLAIM_ID" \
            --arg evidence_class "$EVIDENCE_CLASS" \
            --arg validation_tier "full-kernel-no-daemon" \
            --arg scope "$SCOPE" \
            --arg artifact_path "$ARTIFACT_PATH" \
            --arg content_digest "$CONTENT_DIGEST" \
            --arg run_id "$RUN_ID" \
            --arg source_ref "$SOURCE_REF" \
            --arg outcome "$OUTCOME" \
            --arg residual_risk "$RESIDUAL_RISK" \
            --arg source "$SOURCE_LABEL" \
            --arg generated_at "$GENERATED_AT" \
            '{
              manifest_version: 2,
              claim_id: $claim_id,
              evidence_class: $evidence_class,
              validation_tier: $validation_tier,
              scope: $scope,
              artifact_path: $artifact_path,
              content_digest: $content_digest,
              run_id: $run_id,
              source_ref: $source_ref,
              outcome: $outcome,
              residual_risk: $residual_risk,
              source: $source,
              generated_at: $generated_at,
              blocking_issues: []
            }' > "$MANIFEST_PATH"

          nix develop .#ci --command cargo run --locked -p tidefs-xtask -- validate-evidence-manifest "$MANIFEST_PATH"

          echo "## Evidence manifest written and validated (qemu-smoke, claims-gate authority is standalone workflow)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "$MANIFEST_PATH" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload runtime output
        if: ${{ always() && ((github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.id)) || (github.event_name != 'workflow_dispatch' && matrix.id == 'kmod-xfstests-smoke')) }}
        uses: actions/upload-artifact@v7
        with:
          name: qemu-smoke-${{ matrix.name }}
          path: |
            ${{ matrix.output_dir }}/**
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean cargo target
        if: always()
        run: rm -rf "$CARGO_TARGET_DIR"
