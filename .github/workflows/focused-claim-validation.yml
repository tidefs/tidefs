name: Focused Claim Validation

on:
  workflow_dispatch:
    inputs:
      mode:
        description: >-
          Validation mode:
          validate-claim (needs claim_id),
          check-claims-gate (no extra args),
          check-no-hidden-queues (no extra args),
          validate-evidence-manifest (needs artifact_path),
          validate-ublk-completion (needs artifact_path),
          validate-ublk-started-export (needs artifact_path)
        required: true
        type: choice
        options:
          - validate-claim
          - check-claims-gate
          - check-no-hidden-queues
          - validate-evidence-manifest
          - validate-ublk-completion
          - validate-ublk-started-export
      claim_id:
        description: Claim ID from validation/claims.toml (required for validate-claim)
        required: false
        type: string
      artifact_path:
        description: >-
          Workspace-relative artifact path
          (required for validate-evidence-manifest,
          validate-ublk-completion,
          validate-ublk-started-export)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: >-
    focused-claim-validation-${{ github.ref }}-${{ inputs.mode }}-
    ${{ inputs.claim_id }}-${{ inputs.artifact_path }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: /var/tmp/tidefs-ci/cargo-home
  CARGO_INCREMENTAL: 0
  CARGO_TARGET_DIR: /var/tmp/tidefs-ci/cargo-target/${{ github.run_id }}-${{ github.run_attempt }}
  RUST_BACKTRACE: 1

jobs:
  validate:
    name: Focused claim validation
    runs-on: [self-hosted, linux, x64, tidefs, nix]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare CI scratch
        run: |
          mkdir -p "$CARGO_HOME" "$CARGO_TARGET_DIR"

      - name: Validate inputs
        id: inputs
        env:
          IN_MODE: ${{ inputs.mode }}
          IN_CLAIM_ID: ${{ inputs.claim_id }}
          IN_ARTIFACT_PATH: ${{ inputs.artifact_path }}
        run: |
          MODE="${IN_MODE}"
          CLAIM_ID="${IN_CLAIM_ID}"
          ARTIFACT_PATH="${IN_ARTIFACT_PATH}"

          reject() {
            printf '%s\n' '## Input validation failed' '' >> "$GITHUB_STEP_SUMMARY"
            printf -- '- Mode: `%s`\n' "$MODE" >> "$GITHUB_STEP_SUMMARY"
            printf -- '- Reason: %s\n' "$1" >> "$GITHUB_STEP_SUMMARY"
            printf '::error::%s\n' "$1"
            exit 1
          }

          # Reject free-text inputs containing literal newlines:
          # these would break summary rendering and xtask argument parsing.
          reject_newline() {
            local val_name="$1"
            local val="$2"
            case "$val" in
              *$'\n'*|*$'\r'*)
                reject "${val_name} must not contain newline characters"
                ;;
            esac
          }
          reject_newline 'claim_id' "$CLAIM_ID"
          reject_newline 'artifact_path' "$ARTIFACT_PATH"

          case "$MODE" in
            validate-claim)
              if [[ -z "$CLAIM_ID" ]]; then
                reject "mode 'validate-claim' requires claim_id input"
              fi
              if [[ -n "$ARTIFACT_PATH" ]]; then
                reject "mode 'validate-claim' does not accept artifact_path"
              fi
              ;;
            validate-evidence-manifest|validate-ublk-completion|validate-ublk-started-export)
              if [[ -z "$ARTIFACT_PATH" ]]; then
                reject "mode '$MODE' requires artifact_path input"
              fi
              if [[ -n "$CLAIM_ID" ]]; then
                reject "mode '$MODE' does not accept claim_id"
              fi
              ;;
            check-claims-gate|check-no-hidden-queues)
              if [[ -n "$CLAIM_ID" ]]; then
                reject "mode '$MODE' does not accept claim_id"
              fi
              if [[ -n "$ARTIFACT_PATH" ]]; then
                reject "mode '$MODE' does not accept artifact_path"
              fi
              ;;
            *)
              reject "unknown mode '$MODE'"
              ;;
          esac

          printf '%s\n' "mode=${MODE}" >> "$GITHUB_OUTPUT"
          if [[ -n "$CLAIM_ID" ]]; then
            printf '%s\n' "claim_id=${CLAIM_ID}" >> "$GITHUB_OUTPUT"
          fi
          if [[ -n "$ARTIFACT_PATH" ]]; then
            printf '%s\n' "artifact_path=${ARTIFACT_PATH}" >> "$GITHUB_OUTPUT"
          fi

          # Write accepted-input summary with safe quoting:
          # variables are passed as printf data arguments (%s), never
          # interpolated into the format string, so shell metacharacters,
          # backticks, and $() in input values cannot execute.
          {
            printf '%s\n' '## Input validation passed' ''
            printf -- '- Mode: `%s`\n' "$MODE"
            if [[ -n "$CLAIM_ID" ]]; then
              printf -- '- Claim ID: `%s`\n' "$CLAIM_ID"
            fi
            if [[ -n "$ARTIFACT_PATH" ]]; then
              printf -- '- Artifact path: `%s`\n' "$ARTIFACT_PATH"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run validation
        id: run
        env:
          IN_MODE: ${{ steps.inputs.outputs.mode }}
          IN_CLAIM_ID: ${{ steps.inputs.outputs.claim_id }}
          IN_ARTIFACT_PATH: ${{ steps.inputs.outputs.artifact_path }}
          TIDEFS_FOCUSED_CLAIM_VALIDATION_MODE: ${{ inputs.mode }}
        run: |
          MODE="${IN_MODE}"
          CLAIM_ID="${IN_CLAIM_ID}"
          ARTIFACT_PATH="${IN_ARTIFACT_PATH}"

          {
            printf '%s\n' '## Validation run' ''
          } >> "$GITHUB_STEP_SUMMARY"

          case "$MODE" in
            validate-claim)
              printf -- '- Command: `%s`\n' \
                "cargo run -p tidefs-xtask -- validate-claim '${CLAIM_ID}'" \
                >> "$GITHUB_STEP_SUMMARY"
              set +e
              output=$(nix develop .#ci --command cargo run -p tidefs-xtask -- validate-claim "$CLAIM_ID" 2>&1)
              claim_exit=$?
              set -e
              printf '%s\n' "$output"
              claim_status=$(printf '%s\n' "$output" | awk '/^status:[[:space:]]+[A-Z]+/ { print $2; found=1; exit } END { if (!found) print "UNKNOWN" }')
              printf '%s\n' "claim_status=${claim_status}" >> "$GITHUB_OUTPUT"
              if [[ "$claim_exit" -ne 0 ]]; then
                exit "$claim_exit"
              fi
              ;;
            check-claims-gate)
              printf -- '- Command: `%s`\n' \
                'cargo run -p tidefs-xtask -- check-claims-gate' \
                >> "$GITHUB_STEP_SUMMARY"
              nix develop .#ci --command cargo run -p tidefs-xtask -- check-claims-gate
              ;;
            check-no-hidden-queues)
              printf -- '- Command: `%s`\n' \
                'cargo run -p tidefs-xtask -- check-no-hidden-queues' \
                >> "$GITHUB_STEP_SUMMARY"
              nix develop .#ci --command cargo run -p tidefs-xtask -- check-no-hidden-queues
              ;;
            validate-evidence-manifest)
              printf -- '- Command: `%s`\n' \
                "cargo run -p tidefs-xtask -- validate-evidence-manifest '${ARTIFACT_PATH}'" \
                >> "$GITHUB_STEP_SUMMARY"
              nix develop .#ci --command cargo run -p tidefs-xtask -- validate-evidence-manifest "$ARTIFACT_PATH"
              ;;
            validate-ublk-completion)
              printf -- '- Command: `%s`\n' \
                "cargo run -p tidefs-xtask -- validate-ublk-completion-artifact '${ARTIFACT_PATH}'" \
                >> "$GITHUB_STEP_SUMMARY"
              nix develop .#ci --command cargo run -p tidefs-xtask -- validate-ublk-completion-artifact "$ARTIFACT_PATH"
              ;;
            validate-ublk-started-export)
              printf -- '- Command: `%s`\n' \
                "cargo run -p tidefs-xtask -- validate-ublk-started-export-admission-artifact '${ARTIFACT_PATH}'" \
                >> "$GITHUB_STEP_SUMMARY"
              nix develop .#ci --command cargo run -p tidefs-xtask -- validate-ublk-started-export-admission-artifact "$ARTIFACT_PATH"
              ;;
          esac

      - name: Report result
        if: always()
        run: |
          claim_status="${{ steps.run.outputs.claim_status }}"
          if [[ "$claim_status" == "BLOCKED" ]]; then
            printf '%s\n' '' '**Result**: blocked' >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$claim_status" == "PASS" ]]; then
            printf '%s\n' '' '**Result**: passed' >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.run.outcome }}" == "success" ]]; then
            printf '%s\n' '' '**Result**: passed' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' '' '**Result**: failed' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Clean cargo target
        if: always()
        run: rm -rf "$CARGO_TARGET_DIR"
