# cargo-deny configuration for TideFS dependency license compliance
# Run: cargo deny check licenses

[graph]
targets = ["x86_64-unknown-linux-gnu"]

[advisories]
version = 2
unmaintained = "workspace"
yanked = "warn"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8

# Permissive dependency licenses compatible with the TideFS GPLv2 syscall-note policy
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

# Exceptions for specific crates
exceptions = []

[licenses.private]
ignore = true
registries = []

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
