# cargo-deny configuration for TideFS dependency policy
#
# Two CI lanes consume this file:
#   cargo deny check advisories  (Dependency Advisory workflow)
#   cargo deny check licenses    (future license-gate lane)
#
# Dependency remediation (version bumps, lockfile updates) must be done in a
# separate, focused pull request; the advisory gate only reports drift.

[graph]
targets = ["x86_64-unknown-linux-gnu"]

[advisories]
version = 2
# Unmaintained-crate check scope: "all" | "workspace" | "transitive" | "none"
unmaintained = "workspace"
# Response to yanked-version advisories: "deny" | "warn" | "allow"
yanked = "warn"
# Advisory ids to ignore regardless of severity or policy setting
ignore = [
    "RUSTSEC-2022-0093",  # ed25519-dalek double-public-key oracle (pre-existing)
    "RUSTSEC-2024-0344",  # curve25519-dalek timing variability (pre-existing)
    "RUSTSEC-2025-0057",  # fxhash unmaintained (pre-existing)
    "RUSTSEC-2025-0141",  # bincode unmaintained (pre-existing)
    "RUSTSEC-2026-0097",  # rand unsound with custom logger (pre-existing)
    # TODO: remediate or replace each pre-existing advisory; these are
    # acknowledged per DEPENDENCY_ADVISORY_CI.md so that the advisory gate
    # does not block unrelated PRs.
]

[licenses]
version = 2
confidence-threshold = 0.8

# Permissive dependency licenses compatible with the TideFS GPLv2 syscall-note policy
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

# Exceptions for specific crates
exceptions = []

[licenses.private]
ignore = true
registries = []

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
