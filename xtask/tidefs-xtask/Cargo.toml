[package]
name = "tidefs-xtask"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Workspace summary xtask for tidefs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
ureq = { version = "3", default-features = false, features = ["json"] }
tidefs-types-package-profile-catalog = { path = "../../crates/tidefs-types-package-profile-catalog" }
tidefs-trace-oracle = { path = "../../crates/tidefs-trace-oracle" }
tidefs-crash-oracle = { path = "../../crates/tidefs-crash-oracle" }
tidefs-types-dataset-feature-flags-core = { path = "../../crates/tidefs-types-dataset-feature-flags-core" }
tidefs-schema-codec-vfs = { path = "../../crates/tidefs-schema-codec-vfs" }
tidefs-schema-codec-posix-filesystem-adapter = { path = "../../crates/tidefs-schema-codec-posix-filesystem-adapter" }
tidefs-validation = { path = "../../crates/tidefs-validation", default-features = false }
tidefs-types-vfs-core = { path = "../../crates/tidefs-types-vfs-core" }
tidefs-types-posix-filesystem-adapter-core = { path = "../../crates/tidefs-types-posix-filesystem-adapter-core" }
sha2 = "0.10"
hex = "0.4"


[[bin]]
name = "tidefs-xtask"
path = "src/main.rs"

[dev-dependencies]
tempfile = "3"
