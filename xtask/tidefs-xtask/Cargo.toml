[package]
name = "tidefs-xtask"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Workspace summary xtask for tidefs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { workspace = true }
toml = "0.8"
ureq = { version = "3", default-features = false, features = ["json"] }
tidefs-types-package-profile-catalog = { workspace = true }
tidefs-trace-oracle = { workspace = true }
tidefs-crash-oracle = { workspace = true }
tidefs-types-dataset-feature-flags-core = { workspace = true }
tidefs-schema-codec-vfs = { workspace = true }
tidefs-schema-codec-posix-filesystem-adapter = { workspace = true }
tidefs-validation = { workspace = true, default-features = false }
tidefs-types-vfs-core = { workspace = true }
tidefs-types-posix-filesystem-adapter-core = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }


[[bin]]
name = "tidefs-xtask"
path = "src/main.rs"

[dev-dependencies]
tempfile = { workspace = true }
