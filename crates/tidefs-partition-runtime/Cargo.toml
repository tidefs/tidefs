[package]
name = "tidefs-partition-runtime"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true
description = "P8-02 partition runtime: network partition detection, split-brain prevention, and partition healing for TideFS"

[dependencies]
serde = { version = "1", features = ["derive"] }
ed25519-dalek = { version = "1", features = ["serde"] }
rand = "0.7"
thiserror = "2"
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }
tidefs-membership-live = { path = "../tidefs-membership-live" }
tidefs-witness-set = { path = "../tidefs-witness-set" }

[dev-dependencies]
serde_json = "1"

[lib]
path = "src/lib.rs"
