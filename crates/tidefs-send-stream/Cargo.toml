[package]
name = "tidefs-send-stream"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "VFSSEND2 incremental dataset send stream framing with resumable checkpoints"

[dependencies]
blake3 = "1"
crc32c = { version = "0.6", default-features = false }
tidefs-types-dataset-feature-flags-core = { path = "../tidefs-types-dataset-feature-flags-core" }
tidefs-binary_schema-checksum = { path = "../tidefs-binary_schema-checksum" }
tidefs-binary_schema-core = { path = "../tidefs-binary_schema-core" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }

[dev-dependencies]
tempfile = "3"

[lib]
path = "src/lib.rs"

[features]
default = []
transport = ["tidefs-transport", "tokio"]

[dependencies.tokio]
version = "1"
optional = true
features = ["rt"]
[dependencies.tidefs-transport]
path = "../tidefs-transport"
optional = true
