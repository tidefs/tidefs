[package]
name = "tidefs-send-stream"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "VFSSEND2 incremental dataset send stream framing with resumable checkpoints"

[dependencies]
blake3 = "1"
crc32c = { version = "0.6", default-features = false }
tidefs-types-dataset-feature-flags-core = { workspace = true }
tidefs-binary_schema-checksum = { workspace = true }
tidefs-binary_schema-core = { workspace = true }
tidefs-local-object-store = { workspace = true }
tokio = { workspace = true, optional = true, features = ["rt"] }
tidefs-transport = { workspace = true, optional = true }
tidefs-types-transport-session = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
default = []
transport = ["tidefs-transport", "tidefs-types-transport-session", "tokio"]
