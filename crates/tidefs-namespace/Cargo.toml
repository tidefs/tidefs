[package]
name = "tidefs-namespace"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
TideFS namespace layer providing inode allocation, path resolution, and
core namespace operations (create, lookup, unlink, rename) atop the
polymorphic directory index. This crate is the primary namespace primitive
that the FUSE adapter and higher-level filesystem consumers call.
"""

[dependencies]
tidefs-btree = { workspace = true }
tidefs-dir-index = { workspace = true }
tidefs-types-polymorphic-directory-index-core = { workspace = true, features = ["alloc"] }
tidefs-orphan-index = { workspace = true }
tidefs-types-vfs-core = { workspace = true }
tidefs-intent-log = { workspace = true }
fxhash = "0.2"
tidefs-local-filesystem = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[features]
default = ["in-memory-dir-index"]
in-memory-dir-index = ["tidefs-dir-index/in-memory-dir-index"]
persistent-dir-index = ["tidefs-dir-index/persistent-dir-index"]
local-fs-persist = ["dep:tidefs-local-filesystem"]
