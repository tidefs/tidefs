[package]
name = "tidefs-replicated-object-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "N-replica replicated object store wrapping N LocalObjectStore instances with quorum write protocol I/O coordination"

[dependencies]
tidefs-flow-commit-coordinator = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-quorum-write = { workspace = true }
tidefs-quorum-write-runtime = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-replica-health = { workspace = true }
tidefs-rebuild-runtime = { workspace = true }
tidefs-transport = { workspace = true }
tidefs-replication = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-storage-intent-core = { workspace = true }
tidefs-storage-intent-remote-media-capability = { workspace = true }
tidefs-verification-engine = { workspace = true }
tidefs-types-transport-session = { workspace = true }
tracing = { workspace = true }
bincode = { workspace = true }
blake3 = "1"
tidefs-witness-set = { workspace = true }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
tempfile = { workspace = true }
serde_json = { workspace = true }
tidefs-durability-layout = { workspace = true }

[lib]
path = "src/lib.rs"
