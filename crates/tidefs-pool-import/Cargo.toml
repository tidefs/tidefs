[package]
name = "tidefs-pool-import"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Pool import: device activation, superblock verification, intent log replay,
dataset mount readiness, and pool activation. Phase 3 of pool import/export.
"""

[dependencies]
tidefs-auth = { workspace = true }
tidefs-pool-scan = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-device-removal = { workspace = true }
tidefs-types-pool-label-core = { workspace = true, features = ["serde"] }
serde = { version = "1", features = ["derive"] }
tidefs-commit_group = { workspace = true }
tidefs-encryption = { workspace = true }
tidefs-checksum-tree = { workspace = true }
tidefs-binary_schema-checksum = { workspace = true }
tidefs-intent-log = { workspace = true }
blake3 = "=1.5.5"

[dev-dependencies]
tempfile = { workspace = true }
