[package]
name = "tidefs-pool-import"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = """
Pool import: vdev activation, superblock verification, intent log replay,
dataset mount readiness, and pool activation. Phase 3 of pool import/export.
"""

[dependencies]
tidefs-auth = { path = "../tidefs-auth" }
tidefs-pool-scan = { path = "../tidefs-pool-scan" }
tidefs-device-removal = { path = "../tidefs-device-removal" }
tidefs-types-pool-label-core = { path = "../tidefs-types-pool-label-core", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
tidefs-commit_group = { path = "../tidefs-commit_group" }
tidefs-encryption = { path = "../tidefs-encryption" }
tidefs-checksum-tree = { path = "../tidefs-checksum-tree" }
tidefs-binary_schema-checksum = { path = "../tidefs-binary_schema-checksum" }
tidefs-intent-log = { path = "../tidefs-intent-log" }
blake3 = "=1.5.5"

[dev-dependencies]
tempfile = "3"
