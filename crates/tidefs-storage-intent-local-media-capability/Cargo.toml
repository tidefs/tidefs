[package]
name = "tidefs-storage-intent-local-media-capability"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = """
Conservative local media-capability producer records for storage intent.
Maps local block-I/O, identity, persistence, geometry, health, and freshness
facts into tidefs-storage-intent-core media-capability evidence without
probing hardware or claiming durability from labels.
"""

[dependencies]
tidefs-kernel-storage-io = { path = "../tidefs-kernel-storage-io" }
tidefs-storage-intent-core = { path = "../tidefs-storage-intent-core" }

[lib]
path = "src/lib.rs"
