[package]
name = "tidefs-local-object-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Append-only durable local object-store prototype for TideFS"

[dependencies]
tidefs-auth = { workspace = true }
tidefs-cluster = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-block-allocator = { workspace = true }
tidefs-spacemap-allocator = { workspace = true }
tidefs-pool-allocator = { workspace = true }
tidefs-gc-pin-set = { workspace = true }
tidefs-reclaim = { workspace = true }
tidefs-segment-cleaner = { workspace = true }
tidefs-types-incremental-job-core = { workspace = true }
tidefs-reclaim-queue-core = { workspace = true }
tidefs-types-reclaim-queue-core = { workspace = true }
tidefs-binary_schema-checksum = { workspace = true }
tidefs-binary_schema-core = { workspace = true }
tidefs-binary_schema-framing = { workspace = true }
tidefs-space-accounting = { workspace = true }
serde = { version = "1", features = ["derive"] }
blake3 = "=1.5.5"
tidefs-frame = { workspace = true }
tidefs-checksum-tree = { workspace = true }
tidefs-types-pool-label-core = { workspace = true }
tidefs-commit_group = { workspace = true }
tidefs-reserve-ledger = { workspace = true }
chacha20poly1305 = { workspace = true }
tidefs-erasure-coding = { workspace = true }
tidefs-durability-layout = { workspace = true }
tidefs-placement-planner = { workspace = true }
rand = "0.8"
zeroize = { workspace = true, features = ["derive"] }
zstd = { version = "0.13", default-features = false }
tracing = { workspace = true }

[lib]
path = "src/lib.rs"

[dev-dependencies]
serde_json = { workspace = true }
tempfile = { workspace = true }
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }
tidefs-extent-map = { workspace = true }
tidefs-incremental-job-core = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "object_store"
harness = false

[[bench]]
name = "write_durability_bench"
harness = false

[[bench]]
name = "storage_budget"
harness = false
