[package]
name = "tidefs-distributed-model-check"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Deterministic distributed safety model checker: membership epoch, leases, quorum write, placement receipt authority, and split-brain refusal"

[dependencies]
serde = { version = "1", features = ["derive"] }
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }
tidefs-lease = { path = "../tidefs-lease" }
tidefs-quorum-write = { path = "../tidefs-quorum-write" }
tidefs-replication-model = { path = "../tidefs-replication-model" }
tidefs-placement-runtime = { path = "../tidefs-placement-runtime" }

[dev-dependencies]
serde_json = "1"

[lib]
path = "src/lib.rs"
