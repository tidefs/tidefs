[package]
name = "tidefs-receive-stream"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Receive-stream chunk decoding with BLAKE3 verification and object reassembly for multi-node state transfer"

[dependencies]
blake3 = "1"
crc32c = { version = "0.6", default-features = false }
tidefs-binary_schema-core = { path = "../tidefs-binary_schema-core" }
tidefs-binary_schema-checksum = { path = "../tidefs-binary_schema-checksum" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }

[dev-dependencies]
tempfile = "3"
tidefs-send-stream = { path = "../tidefs-send-stream" }

[lib]
path = "src/lib.rs"
