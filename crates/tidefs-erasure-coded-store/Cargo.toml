[package]
name = "tidefs-erasure-coded-store"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Erasure-coded object store: stripes data with parity across N LocalObjectStore instances using GF(2^8) Reed-Solomon"

[dependencies]
blake3 = "1"
tokio = { workspace = true, features = ["rt", "sync", "macros"] }
tidefs-durability-layout = { workspace = true }
tidefs-erasure-coding = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-placement-planner = { workspace = true }

[dev-dependencies]
proptest = "1"
tokio = { workspace = true, features = ["rt", "sync", "macros", "time"] }
tokio-test = "0.4"

[lib]
path = "src/lib.rs"
