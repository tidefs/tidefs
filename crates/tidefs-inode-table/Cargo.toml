[package]
name = "tidefs-inode-table"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
In-memory inode table: authoritative inode-number-to-attributes registry
with slot allocator, free list, and thread-safe concurrent access.
Provides create, lookup, getattr, setattr, link, unlink, remove, and
iteration operations for a single TideFS namespace shard.
"""

[dependencies]
parking_lot = { version = "0.12", optional = true }
libc = { version = "0.2", optional = true }
tidefs-local-object-store = { workspace = true, optional = true }
tidefs-kernel-storage-io = { workspace = true, optional = true }
tidefs-types-vfs-core = { workspace = true, optional = true }

[dev-dependencies]
proptest = "=1.9.0"
tempfile = { workspace = true }
tidefs-local-object-store = { workspace = true }

[features]
default = ["std"]
std = ["parking_lot", "libc", "tidefs-local-object-store"]
kernel = ["tidefs-kernel-storage-io", "tidefs-types-vfs-core"]
