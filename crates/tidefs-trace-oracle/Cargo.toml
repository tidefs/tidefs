[package]
name = "tidefs-trace-oracle"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Deterministic trace oracle for cross-implementation semantic regression testing"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
blake3 = "=1.5.5"
base64 = "0.22"
tempfile = "3"
tidefs-local-filesystem = { path = "../tidefs-local-filesystem" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
tidefs-model-core = { path = "../tidefs-model-core" }
tidefs-types-vfs-core = { path = "../tidefs-types-vfs-core" }

[lib]
path = "src/lib.rs"

[dev-dependencies]
tempfile = "3"

[[test]]
name = "trace_io"

[[test]]
name = "trace_scenarios"
path = "tests/trace_scenarios.rs"
