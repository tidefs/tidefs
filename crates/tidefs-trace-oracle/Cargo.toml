[package]
name = "tidefs-trace-oracle"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Deterministic trace oracle for cross-implementation semantic regression testing"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
blake3 = "=1.5.5"
base64 = "0.22"
tempfile = { workspace = true }
tidefs-local-filesystem = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-model-core = { workspace = true }
tidefs-types-vfs-core = { workspace = true }

[lib]
path = "src/lib.rs"

[dev-dependencies]
tempfile = { workspace = true }

[[test]]
name = "trace_io"

[[test]]
name = "trace_scenarios"
path = "tests/trace_scenarios.rs"
