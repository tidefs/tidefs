[package]
name = "tidefs-scrub-core"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Background scrub service for periodic segment-level checksum verification in TideFS"

[dependencies]
tidefs-background-scheduler = { path = "../tidefs-background-scheduler" }
tidefs-rebuild-planner = { path = "../tidefs-rebuild-planner" }
tidefs-locator-table = { path = "../tidefs-locator-table" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
tidefs-recovery-loop = { path = "../tidefs-recovery-loop" }
tidefs-types-incremental-job-core = { path = "../tidefs-types-incremental-job-core" }
tidefs-erasure-coding = { path = "../tidefs-erasure-coding" }
tidefs-checksum-tree = { path = "../tidefs-checksum-tree" }
tidefs-types-reclaim-queue-core = { path = "../tidefs-types-reclaim-queue-core" }
tidefs-durability-layout = { path = "../tidefs-durability-layout" }
tidefs-verification-engine = { path = "../tidefs-verification-engine" }
serde = { version = "1", features = ["derive"] }
bincode = "1"
blake3 = "1"

[dev-dependencies]
tempfile = "3"

[lib]
name = "tidefs_scrub"
path = "src/lib.rs"

[[test]]
name = "scrub_repair_validation"
path = "tests/scrub_repair_validation.rs"
