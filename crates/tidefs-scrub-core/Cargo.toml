[package]
name = "tidefs-scrub-core"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Background scrub service for periodic segment-level checksum verification in TideFS"

[dependencies]
tidefs-background-scheduler = { workspace = true }
tidefs-rebuild-planner = { workspace = true }
tidefs-locator-table = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-recovery-loop = { workspace = true }
tidefs-types-incremental-job-core = { workspace = true }
tidefs-erasure-coding = { workspace = true }
tidefs-checksum-tree = { workspace = true }
tidefs-types-reclaim-queue-core = { workspace = true }
tidefs-durability-layout = { workspace = true }
tidefs-verification-engine = { workspace = true }
tidefs-replication-model = { workspace = true }
serde = { version = "1", features = ["derive"] }
bincode = { workspace = true }
blake3 = "1"

[dev-dependencies]
tempfile = { workspace = true }

[lib]
name = "tidefs_scrub"
path = "src/lib.rs"

[[test]]
name = "scrub_repair_validation"
path = "tests/scrub_repair_validation.rs"
