[package]
name = "tidefs-intent-log"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
TideFS intent-log record types, BLAKE3-authenticated framing, and in-memory
append buffer. Defines IntentLogRecord covering all mutating filesystem
operations and IntentLogFrame for checksummed per-record integrity.
Provides IntentLogBuffer as a lock-free append/drain ring that the
TxgCoordinator drains during two-phase commit.
"""

[dependencies]
tidefs-binary_schema-core = { workspace = true }
blake3 = { version = "1", default-features = false }
tidefs-kernel-storage-io = { workspace = true, optional = true }
tidefs-types-vfs-core = { workspace = true, optional = true }
tidefs-transport = { workspace = true, optional = true }

[lib]
path = "src/lib.rs"

[features]
default = ["std"]
std = ["blake3/std"]
kernel-io = ["tidefs-kernel-storage-io", "tidefs-types-vfs-core"]
replication = ["std", "tidefs-transport"]
