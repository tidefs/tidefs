[package]
name = "tidefs-storage-intent-cost"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Non-wear cost ledger for storage-intent policy: capacity, network egress,
replication, retention, compute, layout, movement-debt, payback evidence,
and operator policy weights. Snapshots for planners (#843, #848) and
explanation/performance consumers (#849, #850) without flash endurance,
placement decisions, relocation execution, or operator UAPI.
"""

[features]
default = []
serde = ["dep:serde", "tidefs-storage-intent-core/serde"]

[dependencies]
tidefs-storage-intent-core = { workspace = true }
serde = { version = "1", default-features = false, features = ["derive"], optional = true }

[lib]
path = "src/lib.rs"
