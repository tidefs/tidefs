[package]
name = "tidefs-types-pool-label-core"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
PoolLabelV1 on-device label type, PoolState/DeviceClass enums, BLAKE3-256
encode/decode with checksum verification per POOL_IMPORT_EXPORT design.
no_std / forbid(unsafe_code).
"""

[features]
default = []
alloc = []
serde = ["dep:serde"]

[dependencies]
blake3 = { version = "=1.5.5", default-features = false }
serde = { version = "1", features = ["derive"], optional = true }
