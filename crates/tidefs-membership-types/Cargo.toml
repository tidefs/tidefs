[package]
name = "tidefs-membership-types"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "MEMBERSHIP service (service_id=0x02) wire protocol types: binary encode/decode with CRC32C checksums — no_std"

[features]
default = []
alloc = []
serde = ["dep:serde", "alloc"]

[dependencies]
crc32c = "0.6"
serde = { version = "1", features = ["derive", "alloc"], optional = true, default-features = false }

[dev-dependencies]
serde_json = { workspace = true }

[lib]
path = "src/lib.rs"
