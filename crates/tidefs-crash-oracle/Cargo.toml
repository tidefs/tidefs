[package]
name = "tidefs-crash-oracle"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Model-first crash oracle for bounded TideFS persistence-boundary matrices"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = { workspace = true }
tidefs-model-core = { workspace = true }
tidefs-types-vfs-core = { workspace = true }
tidefs-intent-log = { workspace = true, optional = true }

[lib]
path = "src/lib.rs"

[[bin]]
name = "tidefs-crash-oracle"
path = "src/main.rs"

[features]
intent-log-replay = ["tidefs-intent-log"]
