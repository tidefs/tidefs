[package]
name = "tidefs-binary_schema-core-fuzz"
version = "0.0.0"
edition = "2021"
publish = false
license = "GPL-2.0-only WITH Linux-syscall-note"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[dependencies.tidefs-binary_schema-core]
path = ".."

# Prevent this from being built as part of the workspace's default members
# (cargo-fuzz targets require nightly and are built separately)
[workspace]

[lib]
path = "fake_lib.rs"

[[bin]]
name = "schema_roundtrip"
path = "fuzz_targets/schema_roundtrip.rs"
test = false
doc = false

[[bin]]
name = "malformed_input"
path = "fuzz_targets/malformed_input.rs"
test = false
doc = false
