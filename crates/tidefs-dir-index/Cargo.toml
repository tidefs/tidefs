[package]
name = "tidefs-dir-index"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Persistent directory index with DirEntry/DirPage binary format, object-store
CRUD, ordered iteration, and hysteresis-driven representation switching.
"""

[dependencies]
tidefs-local-object-store = { workspace = true, optional = true }
tidefs-types-polymorphic-directory-index-core = { workspace = true, features = ["alloc"] }
blake3 = { version = "1", default-features = false }
tidefs-btree = { workspace = true }
tidefs-kernel-storage-io = { workspace = true, optional = true }
tidefs-types-vfs-core = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }

[features]
default = ["in-memory-dir-index"]
in-memory-dir-index = []
persistent-dir-index = ["tidefs-local-object-store", "std"]
kernel = ["tidefs-kernel-storage-io", "tidefs-types-vfs-core"]

# Backward compatibility: std enables persistent-dir-index
std = ["persistent-dir-index"]
