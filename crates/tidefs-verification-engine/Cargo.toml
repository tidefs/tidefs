[package]
name = "tidefs-verification-engine"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "P8-03 data_copy_2 verification engine: digest/witness/range/quorum verification of replicated chunks with ReplicaVerificationReceipt emission, plus pool-level segment integrity verification"

[dependencies]
tidefs-replication-model = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-witness-set = { workspace = true }
tidefs-object-io = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-pool-scan = { workspace = true }
tidefs-binary_schema-core = { workspace = true }
serde = { version = "1", features = ["derive"] }
blake3 = "1"

[dev-dependencies]
tidefs-replica-health = { workspace = true }
tempfile = { workspace = true }

[lib]
path = "src/lib.rs"
