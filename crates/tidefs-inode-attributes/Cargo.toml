[package]
name = "tidefs-inode-attributes"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Runtime inode-attribute store providing POSIX attribute get/set dispatch,
link-count tracking, and stat translation. In-memory default; designed
for replacement with a persistent store.
"""

[dependencies]
tidefs-posix-acl = { workspace = true }
tidefs-inode-table = { workspace = true }
parking_lot = "0.12"
tidefs-types-vfs-core = { workspace = true }
libc = "0.2"
tidefs-local-object-store = { workspace = true }


[dev-dependencies]
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }
tempfile = { workspace = true }
