[package]
name = "tidefs-geometry-convert"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Online pool geometry conversion: rewrites locator table entries to change
durability policy (mirror <-> erasure coding) without destroying data.
Uses extent_id indirection so extent maps stay unchanged.
"""

[dependencies]
tidefs-types-incremental-job-core = { workspace = true, features = ["alloc"] }
tidefs-locator-table = { workspace = true }
tidefs-erasure-coding = { workspace = true }

[dev-dependencies]
