[package]
name = "tidefs-recovery-loop"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Continuous failure recovery loop: detect, scope, plan, execute, verify — PC-010.5"

[dependencies]
tidefs-commit_group = { path = "../tidefs-commit_group" }
tidefs-intent-log = { path = "../tidefs-intent-log" }
tidefs-checksum-tree = { path = "../tidefs-checksum-tree" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
blake3 = { version = "1", default-features = false }
tidefs-replication-model = { path = "../tidefs-replication-model" }
tidefs-replica-health = { path = "../tidefs-replica-health" }
tidefs-rebuild-planner = { path = "../tidefs-rebuild-planner" }
tidefs-flow-commit-coordinator = { path = "../tidefs-flow-commit-coordinator" }
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }
tidefs-vfs-engine = { path = "../tidefs-vfs-engine" }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
serde_json = "1"
tempfile = "3.27.0"

[lib]
path = "src/lib.rs"
