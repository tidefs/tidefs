[package]
name = "tidefs-recovery-loop"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Continuous failure recovery loop: detect, scope, plan, execute, verify"

[dependencies]
tidefs-commit_group = { workspace = true }
tidefs-intent-log = { workspace = true }
tidefs-checksum-tree = { workspace = true }
tidefs-local-object-store = { workspace = true }
blake3 = { version = "1", default-features = false }
tidefs-replication-model = { workspace = true }
tidefs-replica-health = { workspace = true }
tidefs-rebuild-planner = { workspace = true }
tidefs-flow-commit-coordinator = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-vfs-engine = { workspace = true }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
serde_json = { workspace = true }
tempfile = "3.27.0"

[lib]
path = "src/lib.rs"
