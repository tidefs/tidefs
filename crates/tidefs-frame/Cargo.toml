[package]
name = "tidefs-frame"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Per-object compression frame format: 5-byte header, zstd/LZ4 encode/decode (shared between tidefs-compression and tidefs-local-object-store)"

[dependencies]
zstd = { version = "0.13", default-features = false }
lz4_flex = "0.11"
thiserror = "2"

[dev-dependencies]
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }

[lib]
path = "src/lib.rs"
