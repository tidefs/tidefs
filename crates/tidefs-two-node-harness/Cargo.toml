[package]
name = "tidefs-two-node-harness"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Deterministic two-node transport harness with storage+transport scenario: loopback, QEMU, BLAKE3-authenticated session, chunk verification, and VFSSEND2 state transfer"

[features]
default = []
qemu = []

[[bin]]
name = "tidefs-two-node-qemu-carrier-validation"
path = "src/bin/qemu_tcp_carrier_validation.rs"
required-features = ["qemu"]

[dependencies]
serde = { version = "1", features = ["derive"] }
bincode = { workspace = true }
blake3 = { version = "1", default-features = false }
tidefs-send-stream = { workspace = true }
tidefs-transport = { workspace = true }
tidefs-auth = { workspace = true }
tidefs-chunk-shipper = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-placement-planner = { workspace = true }
tidefs-durability-layout = { workspace = true }

[dev-dependencies]
tidefs-cluster = { workspace = true }
tidefs-partition-runtime = { workspace = true }
tidefs-rebuild-runtime = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-receive-stream = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-membership-live = { workspace = true }
tidefs-membership-types = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }

[lib]
path = "src/lib.rs"
