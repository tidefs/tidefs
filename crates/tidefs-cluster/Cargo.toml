[package]
name = "tidefs-cluster"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Deterministic cluster membership lease transitions with BLAKE3-verified state integrity for multi-node validation"

[dependencies]
serde = { version = "1", features = ["derive"] }
bincode = { workspace = true }
blake3 = { version = "1", default-features = false }
thiserror = "2"
tidefs-types-pool-label-core = { workspace = true }
tidefs-dataset-catalog = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
tracing = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-replication-model = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tempfile = { workspace = true }

[lib]
path = "src/lib.rs"
