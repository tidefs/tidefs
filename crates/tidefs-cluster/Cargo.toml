[package]
name = "tidefs-cluster"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true
description = "Deterministic cluster membership lease transitions with BLAKE3-verified state integrity for multi-node validation"

[dependencies]
serde = { version = "1", features = ["derive"] }
bincode = "1"
blake3 = { version = "1", default-features = false }
thiserror = "2"
tidefs-types-pool-label-core = { path = "../tidefs-types-pool-label-core" }
tidefs-dataset-catalog = { path = "../tidefs-dataset-catalog" }
tokio = { version = "1", features = ["sync", "time", "rt", "macros"] }
tracing = "0.1"
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }

[dev-dependencies]
serde_json = "1"
tempfile = "3"

[lib]
path = "src/lib.rs"
