[package]
name = "tidefs-storage-intent-read-serving"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Receipt-aware storage-intent read-serving authority model. Defines read source
classes, freshness/evidence predicates, typed refusal states, and read-repair
evidence gating without wiring runtime filesystem or transport read paths.
"""

[features]
default = []
serde = ["dep:serde", "tidefs-storage-intent-core/serde"]

[dependencies]
tidefs-storage-intent-core = { workspace = true }
serde = { version = "1", default-features = false, features = ["derive"], optional = true }

[lib]
path = "src/lib.rs"
