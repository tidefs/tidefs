[package]
name = "tidefs-env-fuse-model"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Pure FUSE lifecycle environment model for TideFS adapter contract traces"

[dependencies]
serde = { version = "1", features = ["derive"] }
tidefs-model-core = { path = "../tidefs-model-core" }
tidefs-types-vfs-core = { path = "../tidefs-types-vfs-core" }

[lib]
path = "src/lib.rs"

[lints]
rust.dead_code = "deny"
rust.unused_imports = "deny"
rust.unused_mut = "deny"
rust.unused_variables = "deny"
