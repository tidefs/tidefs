[package]
name = "tidefs-orphan-index"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Persistent orphan index B+tree runtime. Wraps tidefs-btree::BPlusTree
with OrphanKey entries for crash-recovery-safe tracking of nlink==0 inodes.
"""

[dependencies]
tidefs-btree = { path = "../tidefs-btree" }
tidefs-commit_group = { path = "../tidefs-commit_group" }
tidefs-types-orphan-index-core = { path = "../tidefs-types-orphan-index-core" }
tidefs-binary_schema-checksum = { path = "../tidefs-binary_schema-checksum" }
tidefs-binary_schema-core = { path = "../tidefs-binary_schema-core" }
tidefs-performance-contract = { path = "../tidefs-performance-contract" }
blake3 = { version = "1", default-features = false }

[dev-dependencies]

[lib]
path = "src/lib.rs"
