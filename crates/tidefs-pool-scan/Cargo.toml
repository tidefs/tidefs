[package]
name = "tidefs-pool-scan"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Pool device scanner: device enumeration via /sys/block, device type detection,
pool label reading, and topology report generation. Phase 1 of pool import.
"""

[[bin]]
name = "tidefs-pool-scan"
path = "src/main.rs"

[dependencies]
tidefs-local-object-store = { workspace = true }
tidefs-types-pool-label-core = { workspace = true, features = ["serde"] }
tidefs-replication-model = { workspace = true }
tidefs-membership-epoch = { workspace = true }
thiserror = "2"
serde = { version = "1", features = ["derive"] }
blake3 = "=1.5.5"
serde_json = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
