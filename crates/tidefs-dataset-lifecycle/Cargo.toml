[package]
name = "tidefs-dataset-lifecycle"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Dataset lifecycle runtime: wraps DatasetStateV1 with validated state transitions,
poison semantics for in-flight mounts, GC pin-set integration, and mount-time gating.
"""

[features]
default = ["alloc"]
alloc = [
    "tidefs-incremental-job-core/alloc",
    "tidefs-types-dataset-lifecycle-core/alloc",
    "tidefs-types-incremental-job-core/alloc",
    "tidefs-gc-pin-set/alloc",
]
poison-gating = ["alloc"]

[dependencies]
tidefs-types-dataset-lifecycle-core = { workspace = true }
tidefs-gc-pin-set = { workspace = true }
tidefs-incremental-job-core = { workspace = true }
tidefs-types-incremental-job-core = { workspace = true }
tidefs-types-reclaim-queue-core = { workspace = true }
tidefs-dataset-catalog = { workspace = true }
tidefs-derived-catalog = { workspace = true }
