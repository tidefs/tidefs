[package]
name = "tidefs-validation-fuzz"
version = "0.0.0"
edition = "2021"
publish = false
license = "GPL-2.0-only WITH Linux-syscall-note"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"

# Prevent this from being built as part of the workspace's default members
# (cargo-fuzz targets require nightly and are built separately)
[workspace]

[lib]
path = "fixture_lib.rs"

[[bin]]
name = "json_parse"
path = "fuzz_targets/json_parse.rs"
test = false
doc = false
