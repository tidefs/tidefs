[package]
name = "tidefs-validation"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Userspace validation harness: no-run compile tests, trace oracle for
peer-crate operation recording/replay, and cargo-based smoke framework
exercising peer crates as they land.
"""

[[bin]]
name = "receipt-bound-reclaim-validation"
path = "src/bin/receipt_bound_reclaim_validation.rs"
required-features = ["receipt-bound-physical-reclaim"]

[[bin]]
name = "scrub_foreground_read_validation"
path = "src/bin/scrub_foreground_read_validation.rs"
required-features = ["scrub-runtime"]

[[bin]]
name = "storage-intent-ack-fault-matrix-validation"
path = "src/bin/storage_intent_ack_fault_matrix_validation.rs"
required-features = ["ack-receipt-fault-matrix"]

[features]
default = []

# Capability-named features (at most 8).  Each groups related optional
# dependencies so callers enable what they need without document-reference
# names.

# Core storage structures: btree, block-allocator, dir-index, extent-map.
storage-core = [
    "dep:tidefs-btree",
    "dep:tidefs-block-allocator",
    "dep:tidefs-types-vfs-core",
    "dep:tidefs-dir-index",
    "dep:tidefs-types-polymorphic-directory-index-core",
    "dep:tidefs-extent-map",
    "dep:tidefs-types-extent-map-core",
]

# ublk block-volume adapter validation.
ublk = [
    "dep:tidefs-block-volume-adapter-core",
    "dep:tidefs-ublk-abi",
    "dep:tidefs-block-volume-adapter-ublk-control-runtime",
]

# Multi-node transport cache-coherency and transport-pipeline validation.
transport = ["dep:tidefs-types-cache-lattice-core", "dep:tidefs-cache-core", "dep:tidefs-transport", "dep:tidefs-send-stream"]

# Cluster placement/heal validation.
cluster-placement-heal = ["dep:tidefs-cluster"]

# Receipt-bound reclaim runtime row that reaches the physical drain bridge.
receipt-bound-physical-reclaim = [
    "dep:tidefs-reclaim",
    "dep:tidefs-segment-cleaner",
]

# QEMU raw-media and receipt-gate fault validation for acknowledgment honesty.
ack-receipt-fault-matrix = [
    "dep:tidefs-local-filesystem",
    "dep:tidefs-storage-intent-core",
]

# Mounted scrub/read runtime fixture and object-store seed authority.
scrub-runtime = ["dep:tidefs-local-object-store"]

# Full FUSE userspace POSIX validation: VfsEngine, all POSIX adapter workers,
# and every storage backend needed by the FUSE data path.
fuse = [
    "dep:tidefs-posix-filesystem-adapter-daemon",
    "storage-core",
    "scrub-runtime",
    "dep:tidefs-encryption",
    "dep:tidefs-space-accounting",
    "dep:tidefs-types-space-accounting-core",
    "dep:tidefs-compression",
    "dep:tidefs-frame",
    "dep:tidefs-object-io",
    "dep:tidefs-local-filesystem",
    "dep:tidefs-intent-log",
    "dep:tidefs-reclaim",
    "dep:tidefs-namespace",
    "dep:tidefs-inode-attributes",
    "dep:tidefs-inode-table",
    "dep:tidefs-commit_group",
    "dep:tidefs-trace-oracle",
    "dep:tidefs-vfs-engine",
    "dep:tidefs-posix-semantics",
    "dep:tidefs-posix-acl",
    "dep:tidefs-permission",
    "dep:tidefs-xattr-storage",
    "dep:tidefs-types-polymorphic-xattr-core",
    "dep:tidefs-types-posix-filesystem-adapter-core",
    "dep:tidefs-posix-filesystem-adapter-workers-io",
    "dep:tidefs-posix-filesystem-adapter-workers-locks",
]

# All features enabled.
full = [
    "fuse",
    "ublk",
    "storage-core",
    "transport",
    "cluster-placement-heal",
    "receipt-bound-physical-reclaim",
    "ack-receipt-fault-matrix",
    "scrub-runtime",
]

[dependencies]
libc = "0.2"
serde = { version = "1", features = ["derive"] }
blake3 = "=1.5.5"
serde_json = { workspace = true }
tempfile = { workspace = true }
tidefs-checksum-tree = { workspace = true }
tidefs-btree = { workspace = true, optional = true }
tidefs-block-allocator = { workspace = true, optional = true }
tidefs-block-volume-adapter-core = { workspace = true, optional = true }
tidefs-ublk-abi = { workspace = true, optional = true }
tidefs-block-volume-adapter-ublk-control-runtime = { workspace = true, optional = true }
tidefs-dir-index = { workspace = true, optional = true }
tidefs-types-polymorphic-directory-index-core = { workspace = true, optional = true }
tidefs-extent-map = { workspace = true, optional = true }
tidefs-types-extent-map-core = { workspace = true, optional = true }
tidefs-local-object-store = { workspace = true, optional = true }
tidefs-encryption = { workspace = true, optional = true }
tidefs-compression = { workspace = true, optional = true }
tidefs-space-accounting = { workspace = true, optional = true }
tidefs-types-space-accounting-core = { workspace = true, optional = true }
tidefs-frame = { workspace = true, optional = true }
tidefs-object-io = { workspace = true, optional = true }
tidefs-local-filesystem = { workspace = true, optional = true }
tidefs-storage-intent-core = { workspace = true, optional = true }
tidefs-intent-log = { workspace = true, optional = true }
tidefs-performance-contract = { workspace = true, features = ["serde"] }
tidefs-reclaim = { workspace = true, optional = true }
tidefs-reclaim-queue-core = { workspace = true }
tidefs-segment-cleaner = { workspace = true, optional = true }
tidefs-types-reclaim-queue-core = { workspace = true }
tidefs-namespace = { workspace = true, optional = true }
tidefs-inode-attributes = { workspace = true, optional = true }
tidefs-inode-table = { workspace = true, optional = true }
tidefs-commit_group = { workspace = true, optional = true }
tidefs-trace-oracle = { workspace = true, optional = true }
tidefs-vfs-engine = { workspace = true, optional = true }
tidefs-posix-semantics = { workspace = true, optional = true }
tidefs-posix-acl = { workspace = true, optional = true }
tidefs-permission = { workspace = true, optional = true }
tidefs-xattr-storage = { workspace = true, optional = true }
tidefs-types-polymorphic-xattr-core = { workspace = true, features = ["alloc"], optional = true }
tidefs-types-posix-filesystem-adapter-core = { workspace = true, optional = true }
tidefs-types-vfs-core = { workspace = true, optional = true }
tidefs-cluster = { workspace = true, optional = true }
tidefs-types-cache-lattice-core = { workspace = true, optional = true }
tidefs-cache-core = { workspace = true, optional = true }
tidefs-transport = { workspace = true, optional = true }

tidefs-posix-filesystem-adapter-daemon = { workspace = true, optional = true }
tidefs-posix-filesystem-adapter-workers-io = { workspace = true, optional = true }
tidefs-posix-filesystem-adapter-workers-locks = { workspace = true, optional = true }
tidefs-send-stream = { workspace = true, optional = true }
[lib]
path = "src/lib.rs"

[dev-dependencies]

tokio = { workspace = true, features = ["sync", "rt"] }
tidefs-cluster = { workspace = true }
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }

tidefs-xattr-storage = { workspace = true }
tidefs-intent-log = { workspace = true }
tidefs-types-vfs-core = { workspace = true }
tidefs-vfs-engine = { workspace = true }
tidefs-two-node-harness = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-block-volume-adapter-daemon = { workspace = true }
tidefs-block-volume-adapter-core = { workspace = true }
tidefs-ublk-abi = { workspace = true }
