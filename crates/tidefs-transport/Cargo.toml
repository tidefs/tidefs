[package]
name = "tidefs-transport"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Transport/session layer: TCP transport backend, session cohort graph, 5-lane multiplexing, chunk shipper, reconnection"

[features]
default = []
tls = ["rustls", "rcgen"]
loopback = []
tdma = ["tidefs-tdma-scheduler"]

[dependencies]
serde = { version = "1", features = ["derive"] }
tokio = { workspace = true, features = ["net", "io-util", "sync", "time", "rt", "macros"] }
bytes = "1"
thiserror = "2"
tracing = { workspace = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12"], optional = true }
rcgen = { version = "0.13", default-features = false, features = ["pem", "crypto", "ring"], optional = true }
tidefs-membership-epoch = { workspace = true }
tidefs-membership-types = { workspace = true }
tidefs-clock-timing = { workspace = true }
tidefs-types-transport-session = { workspace = true }
tidefs-tdma-scheduler = { workspace = true, optional = true }
bincode = { workspace = true }
ed25519-dalek = { workspace = true, features = ["serde"] }
rand = "0.7"
blake3 = "1"
tidefs-auth = { workspace = true }
crc32c = "0.6"
tidefs-binary_schema-checksum = { workspace = true }
tidefs-binary_schema-core = { workspace = true }
tidefs-binary_schema-framing = { workspace = true }
tidefs-lease = { workspace = true }
tidefs-lock-service = { workspace = true }
tidefs-cluster = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-placement-planner = { workspace = true }
tidefs-durability-layout = { workspace = true }
chacha20poly1305 = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
libc = "0.2"
lz4_flex = "0.11"
zstd = "0.13"

[dev-dependencies]
tidefs-placement-planner = { workspace = true }
tidefs-durability-layout = { workspace = true }
tidefs-lease = { workspace = true }
tidefs-cluster = { workspace = true }
tokio-test = "0.4"
tempfile = { workspace = true }
tidefs-local-object-store = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "throughput"
harness = false

[build-dependencies]
cc = "1"

[lib]
path = "src/lib.rs"
