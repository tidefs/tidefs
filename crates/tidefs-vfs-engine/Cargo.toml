[package]
name = "tidefs-vfs-engine"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "VFS Engine trait: 29 canonical operations defining the tidefs storage engine interface"

[lib]
path = "src/lib.rs"

[dependencies]
tidefs-types-vfs-core = { path = "../tidefs-types-vfs-core" }
tidefs-types-extent-map-core = { path = "../tidefs-types-extent-map-core" }
tidefs-types-pool-label-core = { path = "../tidefs-types-pool-label-core" }

[dev-dependencies]
tidefs-permission = { path = "../tidefs-permission" }

[features]
default = ["alloc"]
alloc = ["tidefs-types-vfs-core/alloc"]
