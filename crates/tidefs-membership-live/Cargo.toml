[package]
name = "tidefs-membership-live"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "P8-02 live membership runtime: SWIM failure detection, 3-phase epoch transitions, heartbeat protocol"

[features]
default = []
loopback = ["tidefs-transport/loopback"]

[dependencies]
serde = { version = "1", features = ["derive"] }
ed25519-dalek = { workspace = true, features = ["serde"] }
rand = "0.7"
thiserror = "2"
hex = { workspace = true }
bincode = { workspace = true }
serde_json = { workspace = true }
blake3 = { version = "1", default-features = false }
tokio = { workspace = true, features = ["sync"] }
tidefs-membership-epoch = { workspace = true }
tidefs-membership-types = { workspace = true, features = ["serde"] }
tidefs-transport = { workspace = true }
tidefs-auth = { workspace = true }
tidefs-placement-runtime = { workspace = true }
tidefs-durability-layout = { workspace = true }
tidefs-placement-planner = { workspace = true }
tidefs-node-drain = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-cluster = { workspace = true }
tidefs-local-object-store = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["net", "io-util", "sync", "time", "rt", "macros"] }
serde_json = { workspace = true }
tempfile = { workspace = true }
tidefs-local-object-store = { workspace = true }

[lib]
path = "src/lib.rs"
