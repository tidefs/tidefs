[package]
name = "tidefs-flow-commit-coordinator"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "P8-03 data_copy_7 flow commit coordinator: receipt emission and state advancement layer bridging verification, rebuild, relocation, and replication flows"

[dependencies]
tidefs-replication-model = { path = "../tidefs-replication-model" }
tidefs-rebuild-runtime = { path = "../tidefs-rebuild-runtime" }
tidefs-rebuild-planner = { path = "../tidefs-rebuild-planner" }
tidefs-relocation-planner = { path = "../tidefs-relocation-planner" }
tidefs-verification-engine = { path = "../tidefs-verification-engine" }
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
serde_json = "1"

[lib]
path = "src/lib.rs"
