[package]
name = "tidefs-xattr-storage"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Runtime polymorphic xattr storage wrapping XattrStorage with get, set,
remove, list, and hysteresis-driven representation switching between
inline bundle (O(n), n <= 16) and B+tree (O(log n), any size).
Phase 2 of the polymorphic xattr storage design. In-memory only;
persistence deferred to locator-table integration. no_std / forbid(unsafe_code).
"""

[dependencies]
tidefs-types-polymorphic-xattr-core = { workspace = true, features = ["alloc"] }
tidefs-btree = { workspace = true }

tidefs-local-object-store = { workspace = true, optional = true }
tidefs-binary_schema-core = { workspace = true, optional = true }
tidefs-binary_schema-checksum = { workspace = true, optional = true }
tidefs-intent-log = { workspace = true, optional = true }
blake3 = { version = "=1.5.5", optional = true }

[features]
default = []
persistence = ["tidefs-local-object-store", "tidefs-binary_schema-core", "tidefs-binary_schema-checksum", "tidefs-intent-log", "blake3"]

[dev-dependencies]
tidefs-local-object-store = { workspace = true }
tidefs-binary_schema-core = { workspace = true }
tidefs-binary_schema-checksum = { workspace = true }
tidefs-intent-log = { workspace = true }
blake3 = "=1.5.5"
