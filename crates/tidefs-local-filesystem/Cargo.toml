[package]
name = "tidefs-local-filesystem"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "TideFS local filesystem: userspace product core pending kernel extraction. Kernel-portable types (lock tracker, authority token, VFS scalars) are separated from userspace-only harness (std::fs, thread, background scheduler). Full-kernel mode requires extracting or guarding the userspace layer behind cfg(feature = 'userspace')."

[dependencies]
blake3 = "=1.5.5"
zstd = { version = "0.13", default-features = false }
lz4_flex = "0.11"
tidefs-dataset-feature-flags = { workspace = true }
tidefs-extent-map = { workspace = true }
tidefs-dir-index = { workspace = true }
tidefs-types-extent-map-core = { workspace = true }
tidefs-block-allocator = { workspace = true }
tidefs-types-dataset-feature-flags-core = { workspace = true }
tidefs-dataset-lifecycle = { workspace = true }
tidefs-dataset-properties = { workspace = true }
tidefs-dedup = { workspace = true }
tidefs-cache-core = { workspace = true }
tidefs-types-cache-lattice-core = { workspace = true }
tidefs-types-space-accounting-core = { workspace = true }
tidefs-space-accounting = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-durability-layout = { workspace = true }
tidefs-types-vfs-core = { workspace = true, features = ["alloc"] }
tidefs-vfs-engine = { workspace = true }
tidefs-types-vfs-owned = { workspace = true }
tidefs-types-claim-ledger-core = { workspace = true }
tidefs-reserve-ledger = { workspace = true }
tidefs-claim-ledger = { workspace = true }
tidefs-erasure-coding = { workspace = true }
tidefs-performance-contract = { workspace = true, features = ["alloc"] }
tidefs-types-polymorphic-xattr-core = { workspace = true, features = ["alloc"] }
tidefs-posix-acl = { workspace = true, features = ["alloc"] }
tidefs-inode-table = { workspace = true }
tidefs-inode-attributes = { workspace = true }
tidefs-commit_group = { workspace = true }
tidefs-cleanup-engine = { workspace = true }
tidefs-intent-log = { workspace = true }
tidefs-recovery-loop = { workspace = true }
tidefs-send-stream = { workspace = true }
tidefs-receive-stream = { workspace = true }
tidefs-storage-intent-core = { workspace = true }
tidefs-storage-intent-read-serving = { workspace = true }

tidefs-background-scheduler = { workspace = true }
tidefs-compaction = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-scrub-core = { workspace = true }
tidefs-reclaim-queue-core = { workspace = true }
tidefs-types-reclaim-queue-core = { workspace = true }
tidefs-online-defrag = { workspace = true }
tidefs-types-incremental-job-core = { workspace = true }

tidefs-orphan-index = { workspace = true }
tidefs-types-orphan-index-core = { workspace = true }
tidefs-posix-semantics = { workspace = true }

tidefs-quorum-write-runtime = { workspace = true }
rand = "0.8"
tidefs-types-pool-label-core = { workspace = true }
tidefs-pool-scan = { workspace = true }
tidefs-encryption = { workspace = true, optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = { workspace = true }
thiserror = "2"

[features]
encryption = ["dep:tidefs-encryption"]
[lib]
path = "src/lib.rs"

[dev-dependencies]
tempfile = { workspace = true }
tidefs-local-object-store = { workspace = true }
criterion = { workspace = true }
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }
tidefs-types-dataset-lifecycle-core = { workspace = true }
tidefs-reclaim = { workspace = true }

[[bench]]
name = "filesystem"
harness = false
