[package]
name = "tidefs-local-filesystem"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "TideFS local filesystem: userspace product core pending kernel extraction. Kernel-portable types (lock tracker, authority token, VFS scalars) are separated from userspace-only harness (std::fs, thread, background scheduler). Full-kernel mode requires extracting or guarding the userspace layer behind cfg(feature = 'userspace')."

[dependencies]
blake3 = "=1.5.5"
zstd = { version = "0.13", default-features = false }
lz4_flex = "0.11"
tidefs-dataset-feature-flags = { path = "../tidefs-dataset-feature-flags" }
tidefs-extent-map = { path = "../tidefs-extent-map" }
tidefs-dir-index = { path = "../tidefs-dir-index" }
tidefs-types-extent-map-core = { path = "../tidefs-types-extent-map-core" }
tidefs-block-allocator = { path = "../tidefs-block-allocator" }
tidefs-types-dataset-feature-flags-core = { path = "../tidefs-types-dataset-feature-flags-core" }
tidefs-dataset-lifecycle = { path = "../tidefs-dataset-lifecycle" }
tidefs-dataset-properties = { path = "../tidefs-dataset-properties" }
tidefs-types-cache-lattice-core = { path = "../tidefs-types-cache-lattice-core" }
tidefs-types-space-accounting-core = { path = "../tidefs-types-space-accounting-core" }
tidefs-space-accounting = { path = "../tidefs-space-accounting" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
tidefs-durability-layout = { path = "../tidefs-durability-layout" }
tidefs-types-vfs-core = { path = "../tidefs-types-vfs-core", features = ["alloc"] }
tidefs-vfs-engine = { path = "../tidefs-vfs-engine" }
tidefs-types-vfs-owned = { path = "../tidefs-types-vfs-owned" }
tidefs-types-claim-ledger-core = { path = "../tidefs-types-claim-ledger-core" }
tidefs-reserve-ledger = { path = "../tidefs-reserve-ledger" }
tidefs-claim-ledger = { path = "../tidefs-claim-ledger" }
tidefs-erasure-coding = { path = "../tidefs-erasure-coding" }
tidefs-performance-contract = { path = "../tidefs-performance-contract", features = ["alloc"] }
tidefs-types-polymorphic-xattr-core = { path = "../tidefs-types-polymorphic-xattr-core", features = ["alloc"] }
tidefs-posix-acl = { path = "../tidefs-posix-acl", features = ["alloc"] }
tidefs-inode-table = { path = "../tidefs-inode-table" }
tidefs-inode-attributes = { path = "../tidefs-inode-attributes" }
tidefs-commit_group = { path = "../tidefs-commit_group" }
tidefs-cleanup-engine = { path = "../tidefs-cleanup-engine" }
tidefs-intent-log = { path = "../tidefs-intent-log" }
tidefs-recovery-loop = { path = "../tidefs-recovery-loop" }
tidefs-send-stream = { path = "../tidefs-send-stream" }

tidefs-background-scheduler = { path = "../tidefs-background-scheduler" }
tidefs-scrub-core = { path = "../tidefs-scrub-core" }
tidefs-reclaim-queue-core = { path = "../tidefs-reclaim-queue-core" }
tidefs-types-reclaim-queue-core = { path = "../tidefs-types-reclaim-queue-core" }
tidefs-online-defrag = { path = "../tidefs-online-defrag" }
tidefs-types-incremental-job-core = { path = "../tidefs-types-incremental-job-core" }

tidefs-orphan-index = { path = "../tidefs-orphan-index" }
tidefs-types-orphan-index-core = { path = "../tidefs-types-orphan-index-core" }
tidefs-posix-semantics = { path = "../tidefs-posix-semantics" }

tidefs-quorum-write-runtime = { path = "../tidefs-quorum-write-runtime" }
rand = "0.8"
tidefs-types-pool-label-core = { path = "../tidefs-types-pool-label-core" }
tidefs-pool-scan = { path = "../tidefs-pool-scan" }
tidefs-encryption = { path = "../tidefs-encryption", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[features]
encryption = ["dep:tidefs-encryption"]
[lib]
path = "src/lib.rs"

[dev-dependencies]
tempfile = "3"
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
criterion = "0.4"
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }
tidefs-replication-model = { path = "../tidefs-replication-model" }
tidefs-types-dataset-lifecycle-core = { path = "../tidefs-types-dataset-lifecycle-core" }
tidefs-reclaim = { path = "../tidefs-reclaim" }

[[bench]]
name = "filesystem"
harness = false
