[package]
name = "tidefs-space-accounting"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = """
Space accounting runtime: wraps DatasetSpaceCountersV1 with statfs/ENOSPC
integration, delta accumulation, and pool-level capacity gating.
"""

[dependencies]
tidefs-types-space-accounting-core = { path = "../tidefs-types-space-accounting-core" }
hashbrown = { version = "0.15", default-features = false, features = ["inline-more", "default-hasher"] }

[features]
default = ["std"]
std = []
alloc = []
