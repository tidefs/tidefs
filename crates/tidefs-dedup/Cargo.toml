[package]
name = "tidefs-dedup"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Post-process dedup scanner for TideFS.
Maps BLAKE3 content hashes to physical object locators (DDT),
detects duplicate extents written across different inodes,
and merges them by redirecting extent maps to the canonical
copy. Implements IncrementalJob (JobKind::Dedup, BestEffort).
"""

[dependencies]
tidefs-types-extent-map-core = { workspace = true }
tidefs-incremental-job-core = { workspace = true }
tidefs-types-incremental-job-core = { workspace = true }
tidefs-types-reclaim-queue-core = { workspace = true }
blake3 = { version = "1", default-features = false }

[lib]
name = "tidefs_dedup"
path = "src/lib.rs"
