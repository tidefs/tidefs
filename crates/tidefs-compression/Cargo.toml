[package]
name = "tidefs-compression"
version = "0.1.0"
edition = "2021"
description = "Transparent per-object zstd + LZ4 compression wrapper for the TideFS local object store"
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true

[dependencies]
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
tidefs-frame = { path = "../tidefs-frame" }
lz4_flex = "0.11"

[dev-dependencies]
tidefs-frame = { path = "../tidefs-frame" }
proptest = { version = "=1.9.0", default-features = false, features = ["std"] }
criterion = "0.4"
tempfile = "3"

[[bench]]
name = "compression_benchmarks"
harness = false
