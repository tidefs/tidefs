[package]
name = "tidefs-coordination-strategy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Atomic coordination strategy switching protocol with epoch fencing: quiesce-drain-verify-switch-publish lifecycle for all 5 contention levels"

[dependencies]
tidefs-membership-epoch = { workspace = true }
serde = { version = "1", features = ["derive"], optional = true }

[dev-dependencies]
proptest = "1"
serde_json = { workspace = true }

[features]
default = []
serde = ["dep:serde"]

[lib]
path = "src/lib.rs"
