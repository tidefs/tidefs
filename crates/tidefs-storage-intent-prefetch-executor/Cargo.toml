[package]
name = "tidefs-storage-intent-prefetch-executor"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Storage-intent prefetch/staging executor boundary records. Consumes #967
prefetch/residency decisions and #913 evidence-query snapshots, preserves
cache-only/trial/staged state, and emits conservative scheduler, cost, and
handoff outcomes without runtime I/O or durable receipt authority.
"""

[features]
default = []
serde = [
  "dep:serde",
  "tidefs-storage-intent-core/serde",
  "tidefs-storage-intent-cost/serde",
]

[dependencies]
tidefs-storage-intent-core = { workspace = true }
tidefs-storage-intent-cost = { workspace = true }
serde = { version = "1", default-features = false, features = ["derive"], optional = true }

[lib]
path = "src/lib.rs"
