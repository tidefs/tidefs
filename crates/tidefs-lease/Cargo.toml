[package]
name = "tidefs-lease"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Cluster-wide lease mechanism: time-bounded grants of exclusive/shared authority over mutation domains with quorum-backed issuance, automatic renewal, fencing, and receipt integration"

[dependencies]
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tidefs-clock-timing = { workspace = true }
tidefs-membership-epoch = { workspace = true }
bincode = { workspace = true }
tidefs-binary_schema-core = { workspace = true }
tidefs-binary_schema-checksum = { workspace = true }
tidefs-binary_schema-framing = { workspace = true }
tidefs-cache-coherency = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[lib]
path = "src/lib.rs"
