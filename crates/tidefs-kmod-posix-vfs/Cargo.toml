[package]
name = "tidefs-kmod-posix-vfs"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "TideFS kernel POSIX VFS adapter (stratum s3 / c7) — clean-read namespace seam (K7-05). Delegates Linux VFS operations to the canonical VfsEngine trait through the kmod-bridge substrate."

[dependencies]
tidefs-types-vfs-core = { workspace = true }
tidefs-vfs-engine = { workspace = true }
tidefs-kmod-bridge = { workspace = true }
tidefs-types-pool-label-core = { workspace = true }
tidefs-kernel-storage-io = { workspace = true }
tidefs-commit_group = { workspace = true, features = ["kernel-storage"] }
tidefs-xattr-storage = { workspace = true }
tidefs-types-extent-map-core = { workspace = true }
blake3 = "1"

[dev-dependencies]

blake3 = { version = "1", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = { workspace = true }
tidefs-local-filesystem = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-trace-oracle = { workspace = true }
tempfile = { workspace = true }
base64 = "0.22"


[lib]
path = "src/lib.rs"

[lints.rust]
# CONFIG_RUST is set by the Linux kernel Kbuild system; Cargo sees it as unexpected.
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(CONFIG_RUST)'] }

[lints.clippy]
unsafe_code = "allow"
