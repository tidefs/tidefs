[package]
name = "tidefs-kmod-posix-vfs"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "TideFS kernel POSIX VFS adapter (stratum s3 / c7) — clean-read namespace seam (K7-05). Delegates Linux VFS operations to the canonical VfsEngine trait through the kmod-bridge substrate."

[dependencies]
tidefs-types-vfs-core = { path = "../tidefs-types-vfs-core" }
tidefs-vfs-engine = { path = "../tidefs-vfs-engine" }
tidefs-kmod-bridge = { path = "../../kmod" }
tidefs-types-pool-label-core = { path = "../tidefs-types-pool-label-core" }
tidefs-kernel-storage-io = { path = "../tidefs-kernel-storage-io" }
tidefs-commit_group = { path = "../tidefs-commit_group", features = ["kernel-storage"] }
tidefs-xattr-storage = { path = "../tidefs-xattr-storage" }
tidefs-types-extent-map-core = { path = "../tidefs-types-extent-map-core" }
blake3 = "1"

[dev-dependencies]

blake3 = { version = "1", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tidefs-local-filesystem = { path = "../tidefs-local-filesystem" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
tidefs-trace-oracle = { path = "../tidefs-trace-oracle" }
tempfile = "3"
base64 = "0.22"


[lib]
path = "src/lib.rs"

[lints.rust]
# CONFIG_RUST is set by the Linux kernel Kbuild system; Cargo sees it as unexpected.
unexpected_cfgs = { level = "allow", check-cfg = ['cfg(CONFIG_RUST)'] }
