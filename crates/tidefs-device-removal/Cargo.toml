[package]
name = "tidefs-device-removal"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Device removal state machine: orchestrates safe device decommission from a
TideFS pool with object evacuation, locator-table migration, allocation
fencing, and committed-root anchoring for crash-safe resume.
"""

[dependencies]
tidefs-pool-scan = { workspace = true }
tidefs-locator-table = { workspace = true }
tidefs-block-allocator = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-types-pool-label-core = { workspace = true }
serde = { version = "1", features = ["derive"] }
serde_json = { workspace = true }
blake3 = "=1.5.5"
thiserror = "2"

[dev-dependencies]
tempfile = { workspace = true }
tidefs-membership-epoch = { workspace = true }


[lib]
path = "src/lib.rs"

[lints]
rust.dead_code = "deny"
rust.unused_imports = "deny"
rust.unused_mut = "deny"
rust.unused_must_use = "deny"
