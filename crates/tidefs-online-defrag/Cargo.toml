[package]
name = "tidefs-online-defrag"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Online extent map defragmentation service for TideFS.
Scans extent maps for fragmentation, merges adjacent extents,
and rewrites fragmented extent maps into compact form as an
IncrementalJob (JobKind::Defrag, BestEffort priority).
"""

[dependencies]
tidefs-extent-map = { workspace = true }
tidefs-types-extent-map-core = { workspace = true }
tidefs-incremental-job-core = { workspace = true }
tidefs-types-incremental-job-core = { workspace = true }

[lib]
name = "tidefs_online_defrag"
path = "src/lib.rs"
