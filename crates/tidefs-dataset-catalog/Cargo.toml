[package]
name = "tidefs-dataset-catalog"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Pool-wide dataset catalog with B+tree path-to-ID mapping and online rename
without unmount. Maps dataset paths to stable dataset IDs so file handles
survive renames.
"""

[dependencies]
tidefs-btree = { workspace = true }
tidefs-binary_schema-core = { workspace = true }
tidefs-binary_schema-checksum = { workspace = true }
blake3 = { version = "1", default-features = false }
tidefs-dataset-properties = { workspace = true }

[dev-dependencies]

[lib]
path = "src/lib.rs"
