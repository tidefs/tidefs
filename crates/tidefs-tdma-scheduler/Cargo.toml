[package]
name = "tidefs-tdma-scheduler"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Per-object TDMA time-slot scheduler: fair round-robin allocation across contending nodes, configurable slot duration, bounded starvation prevention"

[dependencies]
blake3 = { version = "1", default-features = false }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
tidefs-coordination-strategy = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-clock-timing = { workspace = true }

[lib]
path = "src/lib.rs"

[dev-dependencies]
serde_json = { workspace = true }
