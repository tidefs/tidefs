[package]
name = "tidefs-membership-epoch"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Deterministic membership_placement_0 epoch model and failure/rejoin tests"

[dependencies]
bincode = { workspace = true }
serde = { version = "1", features = ["derive"] }
blake3 = "1"
serde_json = { workspace = true }
tidefs-membership-types = { workspace = true, features = ["serde"] }
tidefs-auth = { workspace = true }
tidefs-types-pool-label-core = { workspace = true, features = ["serde"] }

[dev-dependencies]

ed25519-dalek = { workspace = true, features = ["serde"] }
rand = "0.7"

[lib]
path = "src/lib.rs"
