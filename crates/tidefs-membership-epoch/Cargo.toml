[package]
name = "tidefs-membership-epoch"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Deterministic membership_placement_0 epoch model and failure/rejoin tests"

[dependencies]
bincode = "1"
serde = { version = "1", features = ["derive"] }
blake3 = "1"
serde_json = "1"
tidefs-membership-types = { path = "../tidefs-membership-types", features = ["serde"] }
tidefs-auth = { path = "../tidefs-auth" }
tidefs-types-pool-label-core = { path = "../tidefs-types-pool-label-core", features = ["serde"] }

[dev-dependencies]

ed25519-dalek = { version = "1", features = ["serde"] }
rand = "0.7"

[lib]
path = "src/lib.rs"
