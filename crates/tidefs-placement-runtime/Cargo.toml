[package]
name = "tidefs-placement-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Placement runtime engine: executes deterministic placement plans across nodes with budget tracking, plan conflict resolution, and 5-phase lifecycle"

[dependencies]
serde = { version = "1", features = ["derive"] }
blake3 = "1"
thiserror = "2"
tidefs-block-allocator = { workspace = true }
tidefs-lease = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-placement-planner = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-flow-commit-coordinator = { workspace = true }
tidefs-rebalance-planner = { workspace = true }
tidefs-node-join = { workspace = true }
tidefs-rebuild-planner = { workspace = true }
tidefs-replica-health = { workspace = true }
tidefs-durability-layout = { workspace = true }
tidefs-device-removal = { workspace = true }
tidefs-locator-table = { workspace = true }

[dev-dependencies]

[lib]
path = "src/lib.rs"
