[package]
name = "tidefs-replication"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Replication protocol: fanout write, quorum ACK collection, degraded read protocol, and policy selection"

[dependencies]
blake3 = "1"
serde = { version = "1", features = ["derive"] }
tidefs-transport = { path = "../tidefs-transport" }
tidefs-replication-model = { path = "../tidefs-replication-model" }
tidefs-quorum-write = { path = "../tidefs-quorum-write" }
tidefs-flow-commit-coordinator = { path = "../tidefs-flow-commit-coordinator" }
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }


tidefs-local-object-store = { path = "../tidefs-local-object-store", optional = true }
tidefs-placement-runtime = { path = "../tidefs-placement-runtime", optional = true }


[features]
default = []
local-store-adapter = ["tidefs-local-object-store"]
placement-adapter = ["tidefs-placement-runtime"]

[lib]
path = "src/lib.rs"

[dev-dependencies]
tempfile = "3"
