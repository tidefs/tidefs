[package]
name = "tidefs-replication"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Replication protocol: fanout write, quorum ACK collection, degraded read protocol, and policy selection"

[dependencies]
blake3 = "1"
serde = { version = "1", features = ["derive"] }
tidefs-transport = { workspace = true }
tidefs-replication-model = { workspace = true }
tidefs-quorum-write = { workspace = true }
tidefs-flow-commit-coordinator = { workspace = true }
tidefs-membership-epoch = { workspace = true }


tidefs-local-object-store = { workspace = true, optional = true }
tidefs-placement-runtime = { workspace = true, optional = true }


[features]
default = []
local-store-adapter = ["tidefs-local-object-store"]
placement-adapter = ["tidefs-placement-runtime"]

[lib]
path = "src/lib.rs"

[dev-dependencies]
tempfile = { workspace = true }
