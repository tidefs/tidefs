[package]
name = "tidefs-node-join"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Node join protocol: staged promotion p4(p4)→p2→p5 with health gates"

[dependencies]
serde = { version = "1", features = ["derive"] }
thiserror = "2"
bincode = "1"
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }
tidefs-types-pool-label-core = { path = "../tidefs-types-pool-label-core" }
tidefs-replication-model = { path = "../tidefs-replication-model" }
tidefs-binary_schema-core = { path = "../tidefs-binary_schema-core" }
tidefs-binary_schema-checksum = { path = "../tidefs-binary_schema-checksum" }
tidefs-checksum-tree = { path = "../tidefs-checksum-tree" }
tidefs-transport = { path = "../tidefs-transport" }
tidefs-auth = { path = "../tidefs-auth" }

[dev-dependencies]
blake3 = "1"

[lib]
path = "src/lib.rs"
