[package]
name = "tidefs-storage-intent-prefetch-feedback"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Closed-loop storage-intent prefetch and residency feedback records. Consumes
prefetch executor outcomes plus measurement-attribution evidence, emits
dataset-scoped conservative learning summaries, cooldowns, payback candidates,
and demotion hints without runtime I/O, receipt retirement, authority movement,
or product/comparator claims.
"""

[features]
default = []
serde = [
  "dep:serde",
  "tidefs-storage-intent-core/serde",
  "tidefs-storage-intent-prefetch-executor/serde",
]

[dependencies]
tidefs-storage-intent-core = { workspace = true }
tidefs-storage-intent-prefetch-executor = { workspace = true }
serde = { version = "1", default-features = false, features = ["derive"], optional = true }

[lib]
path = "src/lib.rs"
