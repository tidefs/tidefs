[package]
name = "tidefs-commit_group"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Transaction group (commit_group) subsystem for TideFS: dirty-page tracking,
write accumulation, atomic commit to the object store, and fsync
durability. Central write-path funnel between in-memory mutation
and stable storage.
"""

[dependencies]
tidefs-intent-log = { workspace = true, optional = true }
tidefs-types-extent-map-core = { workspace = true, optional = true }
tidefs-extent-map = { workspace = true, optional = true }
tidefs-checksum-tree = { workspace = true, optional = true }
tidefs-kernel-storage-io = { workspace = true, optional = true }
tidefs-vfs-engine = { workspace = true, optional = true }
tidefs-types-vfs-core = { workspace = true, optional = true }
blake3 = { version = "=1.5.5", default-features = false }
serde = { version = "1", features = ["derive"], optional = true }

[dev-dependencies]
serde_json = { workspace = true }
tempfile = { workspace = true }
tidefs-local-object-store = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
default = ["std"]
std = [
    "blake3/std",
    "serde",
    "tidefs-checksum-tree",
    "tidefs-extent-map",
    "tidefs-intent-log",
    "tidefs-intent-log/std",
    "tidefs-types-extent-map-core",
]
kernel-storage = [
    "tidefs-kernel-storage-io",
    "tidefs-types-vfs-core",
    "tidefs-vfs-engine",
]
