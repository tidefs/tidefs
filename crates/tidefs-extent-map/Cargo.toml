[package]
name = "tidefs-extent-map"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true
autobenches = false

description = """
V1 inline-list extent map implementing ExtentMapOps for
per-file byte-range-to-physical mapping with HOLE/UNWRITTEN/DATA tristate
semantics. Up to 6 entries per extent map; larger maps use V2 B-tree
backed by tidefs-btree.
"""

[dependencies]
tidefs-types-extent-map-core = { path = "../tidefs-types-extent-map-core" }
tidefs-btree = { path = "../tidefs-btree" }
blake3 = { version = "1", default-features = false }
tidefs-kernel-storage-io = { path = "../tidefs-kernel-storage-io", optional = true, default-features = false }
tidefs-types-vfs-core = { path = "../tidefs-types-vfs-core", optional = true }
tidefs-shard-group = { path = "../tidefs-shard-group" }

[features]
default = ["std"]
std = []
kernel = ["tidefs-kernel-storage-io", "tidefs-types-vfs-core"]

[dev-dependencies]
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
tidefs-types-extent-map-core = { path = "../tidefs-types-extent-map-core" }

[[test]]
name = "v1_vs_v2_bench"
path = "benches/v1_vs_v2.rs"
harness = true

[lib]
path = "src/lib.rs"
