[package]
name = "tidefs-extent-map"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

autobenches = false

description = """
V1 inline-list extent map implementing ExtentMapOps for
per-file byte-range-to-physical mapping with HOLE/UNWRITTEN/DATA tristate
semantics. Up to 6 entries per extent map; larger maps use V2 B-tree
backed by tidefs-btree.
"""

[dependencies]
tidefs-types-extent-map-core = { workspace = true }
tidefs-btree = { workspace = true }
blake3 = { version = "1", default-features = false }
tidefs-kernel-storage-io = { workspace = true, default-features = false, optional = true }
tidefs-types-vfs-core = { workspace = true, optional = true }
tidefs-shard-group = { workspace = true }

[features]
default = ["std"]
std = []
kernel = ["tidefs-kernel-storage-io", "tidefs-types-vfs-core"]

[dev-dependencies]
tidefs-local-object-store = { workspace = true }
tidefs-types-extent-map-core = { workspace = true }

[[test]]
name = "v1_vs_v2_bench"
path = "benches/v1_vs_v2.rs"
harness = true

[lib]
path = "src/lib.rs"
