[package]
name = "tidefs-storage-intent-scheduler"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Storage-intent demand-side admission and scheduling layer. Consumes compiled
policy from #855, storage-intent records from #841, and the unified lane model
from tidefs-types-transport-session to enforce intent-aware admission lanes,
QoS budgets, backpressure, and speculative-drop behavior without implementing
placement, receipts, relocation execution, or operator rendering.
"""

[features]
default = []
serde = ["dep:serde", "tidefs-storage-intent-core/serde"]

[dependencies]
tidefs-storage-intent-core = { workspace = true }
tidefs-types-transport-session = { workspace = true }
serde = { version = "1", default-features = false, features = ["derive", "alloc"], optional = true }

[dev-dependencies]
tidefs-storage-intent-core = { workspace = true }
tidefs-types-transport-session = { workspace = true }
serde_json = { workspace = true }

[lib]
path = "src/lib.rs"
