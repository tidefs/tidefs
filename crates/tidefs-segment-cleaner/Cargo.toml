[package]
name = "tidefs-segment-cleaner"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = """
Segment-level garbage collection for the TideFS local object store:
identifies dead segments, compacts live records from fragmented segments,
and frees fully-dead segments back to the pool allocator.
"""

[dependencies]
tidefs-types-incremental-job-core = { workspace = true }
tidefs-incremental-job-core = { workspace = true }
tidefs-reclaim-queue-core = { workspace = true }
tidefs-gc-pin-set = { workspace = true }
tidefs-types-dataset-lifecycle-core = { workspace = true }
tidefs-cleanup-queue-core = { workspace = true }
tidefs-commit_group = { workspace = true }
tidefs-reclaim = { workspace = true }
tidefs-types-reclaim-queue-core = { workspace = true }
blake3 = "1"
