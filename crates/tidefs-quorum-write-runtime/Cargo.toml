[package]
name = "tidefs-quorum-write-runtime"
version.workspace = true
edition.workspace = true
publish.workspace = true
license.workspace = true
authors.workspace = true

description = "Runtime quorum write coordinator that wires the deterministic PREPARE-TRANSFER-COMMIT-WITNESS protocol into the LocalFileSystem I/O path"

[dependencies]
tidefs-quorum-write = { path = "../tidefs-quorum-write" }
tidefs-membership-epoch = { path = "../tidefs-membership-epoch" }
tidefs-local-object-store = { path = "../tidefs-local-object-store" }
tidefs-durability-layout = { path = "../tidefs-durability-layout" }
tidefs-replication-model = { path = "../tidefs-replication-model" }
serde = { version = "1", features = ["derive"] }
sha2 = "0.10"
blake3 = "1"
tidefs-replication = { path = "../tidefs-replication" }
tidefs-tdma-scheduler = { path = "../tidefs-tdma-scheduler" }
tidefs-lease = { path = "../tidefs-lease" }
tidefs-lease-manager = { path = "../tidefs-lease-manager" }
tidefs-cache-coherency = { path = "../tidefs-cache-coherency" }

[dev-dependencies]
serde_json = "1"

[lib]
path = "src/lib.rs"
