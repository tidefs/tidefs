[package]
name = "tidefs-quorum-write-runtime"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true

description = "Runtime quorum write coordinator that wires the deterministic PREPARE-TRANSFER-COMMIT-WITNESS protocol into the LocalFileSystem I/O path"

[dependencies]
tidefs-quorum-write = { workspace = true }
tidefs-membership-epoch = { workspace = true }
tidefs-local-object-store = { workspace = true }
tidefs-durability-layout = { workspace = true }
tidefs-replication-model = { workspace = true }
serde = { version = "1", features = ["derive"] }
sha2 = { workspace = true }
blake3 = "1"
tidefs-replication = { workspace = true }
tidefs-tdma-scheduler = { workspace = true }
tidefs-lease = { workspace = true }
tidefs-lease-manager = { workspace = true }
tidefs-cache-coherency = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[lib]
path = "src/lib.rs"
